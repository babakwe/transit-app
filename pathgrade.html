<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>TownTrip</title>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f13;
  --surface: #1a1a22;
  --surface2: #22222e;
  --border: rgba(255,255,255,0.08);
  --accent: #4f8dff;
  --accent2: #7c5cfc;
  --green: #22c55e;
  --yellow: #f59e0b;
  --red: #ef4444;
  --text: #f1f1f5;
  --muted: #8888a0;
  --radius: 16px;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

/* ── MAP ── */
#map { position: fixed; inset: 0; z-index: 0; }

/* ── OVERLAY STACK ── */
#overlay { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; pointer-events: none; }
#overlay > * { pointer-events: auto; }

/* ── TOP BAR ── */
#topbar { padding: 14px 16px 10px; display: flex; align-items: center; gap: 10px; }
#logo { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; color: var(--accent); background: rgba(79,141,255,0.12); padding: 4px 10px; border-radius: 8px; }
#search-wrap { flex: 1; position: relative; }
#search { width: 100%; height: 40px; padding: 0 14px; background: rgba(26,26,34,0.92); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 14px; outline: none; }
#search::placeholder { color: var(--muted); }
#search-results { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: none; z-index: 50; }
.sr-item { padding: 10px 14px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); }
.sr-item:last-child { border-bottom: none; }
.sr-item:hover { background: var(--surface2); }

/* ── WALK MODE TOGGLE BUTTON ── */
#walk-mode-btn {
  width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--border);
  background: rgba(26,26,34,0.92); backdrop-filter: blur(12px);
  color: var(--muted); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.2s, color 0.2s, border-color 0.2s;
}
#walk-mode-btn.active {
  background: rgba(34,197,94,0.15); color: var(--green); border-color: rgba(34,197,94,0.4);
}

/* ── SPACER ── */
#spacer { flex: 1; }

/* ── WALK TRACKER OVERLAY (sits above spacer, below panel) ── */
#walk-overlay {
  display: none;
  pointer-events: none;
  padding: 0 16px 12px;
  flex-direction: column;
  gap: 10px;
}
#walk-overlay.visible { display: flex; }

/* Stats bar */
#walk-stats {
  pointer-events: auto;
  display: flex; gap: 8px;
}
.stat-chip {
  flex: 1; background: rgba(15,15,19,0.88); backdrop-filter: blur(16px);
  border: 1px solid rgba(34,197,94,0.25); border-radius: 12px;
  padding: 10px 8px; text-align: center;
}
.stat-val { font-size: 20px; font-weight: 800; color: var(--green); letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
.stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

/* Control buttons */
#walk-controls { pointer-events: auto; display: flex; gap: 10px; }
#walk-start-btn, #walk-stop-btn {
  flex: 1; height: 44px; border-radius: 12px; border: none; cursor: pointer;
  font-size: 14px; font-weight: 700; letter-spacing: 0.02em; transition: opacity 0.15s;
}
#walk-start-btn { background: var(--green); color: #0f0f13; }
#walk-stop-btn { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
#walk-start-btn:disabled, #walk-stop-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* Walk history chips */
#walk-history {
  pointer-events: auto;
  display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px;
}
#walk-history::-webkit-scrollbar { display: none; }
.history-chip {
  flex-shrink: 0; background: rgba(26,26,34,0.88); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 6px 12px; font-size: 11px; color: var(--muted); cursor: pointer;
  white-space: nowrap;
}
.history-chip:hover { border-color: rgba(34,197,94,0.3); color: var(--green); }

/* ── BOTTOM PANEL (bus mode) ── */
#panel {
  background: rgba(15,15,19,0.95); backdrop-filter: blur(20px);
  border-top: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0;
  padding: 20px 20px 32px;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
#panel.walk-mode { transform: translateY(100%); pointer-events: none; }

/* ── WIDGET ── */
#widget { background: linear-gradient(135deg, rgba(79,141,255,0.08), rgba(124,92,252,0.08)); border: 1px solid rgba(79,141,255,0.2); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
#widget.hidden { display: none; }
#widget.urgent { border-color: rgba(239,68,68,0.4); background: linear-gradient(135deg, rgba(239,68,68,0.08), rgba(239,68,68,0.04)); }
#widget.soon { border-color: rgba(245,158,11,0.4); background: linear-gradient(135deg, rgba(245,158,11,0.08), rgba(245,158,11,0.04)); }
#widget.good { border-color: rgba(34,197,94,0.3); background: linear-gradient(135deg, rgba(34,197,94,0.07), rgba(79,141,255,0.05)); }
#widget-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
#widget-route { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
#widget-headsign { font-size: 12px; color: var(--muted); margin-top: 1px; }
#widget-status { font-size: 11px; color: var(--muted); text-align: right; }
#widget-timer { display: flex; align-items: flex-end; gap: 20px; padding: 10px 0; }
.timer-block { text-align: center; }
.timer-num { font-size: 52px; font-weight: 900; line-height: 1; letter-spacing: -3px; }
.timer-num.urgent { color: var(--red); }
.timer-num.soon { color: var(--yellow); }
.timer-num.good { color: var(--green); }
.timer-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
.timer-divider { color: var(--muted); font-size: 28px; font-weight: 300; padding-bottom: 10px; }
#widget-footer { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.pill { font-size: 11px; padding: 4px 10px; border-radius: 20px; background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
.pill.active { background: rgba(79,141,255,0.15); color: var(--accent); border-color: rgba(79,141,255,0.3); }
#next-buses { display: flex; gap: 10px; margin-bottom: 16px; }
.next-bus-card { flex: 1; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
.nb-mins { font-size: 22px; font-weight: 800; }
.nb-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
.nb-dist { font-size: 11px; color: var(--muted); margin-top: 4px; }
#stop-picker { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; }
#stop-picker-text { flex: 1; font-size: 14px; }
#stop-picker-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.stop-icon { font-size: 20px; }
#widget-loading { text-align: center; padding: 24px; color: var(--muted); font-size: 14px; }
#widget-empty { text-align: center; padding: 20px; color: var(--muted); font-size: 13px; line-height: 1.6; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.refreshing { animation: pulse 1.2s ease infinite; }

/* ── RECENTER BUTTON ── */
#recenter-btn {
  position: fixed; right: 16px; bottom: 200px; z-index: 20;
  width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--border);
  background: rgba(15,15,19,0.88); backdrop-filter: blur(16px);
  color: var(--text); font-size: 18px; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  transition: opacity 0.2s;
}
#recenter-btn.visible { display: flex; }

/* ── GPS pulse dot (Mapbox marker override) ── */
.walk-dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: #22c55e; border: 3px solid #fff;
  box-shadow: 0 0 0 0 rgba(34,197,94,0.6);
  animation: gps-pulse 1.6s ease-out infinite;
}
@keyframes gps-pulse {
  0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }
  70%  { box-shadow: 0 0 0 14px rgba(34,197,94,0); }
  100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
}
</style>
</head>
<body>
<div id="map"></div>

<div id="overlay">
  <!-- Top bar -->
  <div id="topbar">
    <div id="logo">TT</div>
    <div id="search-wrap">
      <input id="search" type="text" placeholder="Search an address or stop…" autocomplete="off" />
      <div id="search-results"></div>
    </div>
    <button id="walk-mode-btn" title="Walk Tracker">🚶</button>
  </div>

  <!-- Spacer (fills space between topbar and walk overlay / panel) -->
  <div id="spacer"></div>

  <!-- Walk tracker overlay (sits above the panel slot) -->
  <div id="walk-overlay">
    <div id="walk-stats">
      <div class="stat-chip"><div class="stat-val" id="stat-dist">0.00</div><div class="stat-lbl">Miles</div></div>
      <div class="stat-chip"><div class="stat-val" id="stat-dur">0:00</div><div class="stat-lbl">Time</div></div>
      <div class="stat-chip"><div class="stat-val" id="stat-pace">—</div><div class="stat-lbl">Pace/mi</div></div>
      <div class="stat-chip"><div class="stat-val" id="stat-steps">0</div><div class="stat-lbl">Steps</div></div>
    </div>
    <div id="walk-controls">
      <button id="walk-start-btn">▶ Start Walk</button>
      <button id="walk-stop-btn" disabled>■ Stop</button>
    </div>
    <div id="walk-history"></div>
  </div>

  <!-- Bus panel (hidden in walk mode) -->
  <div id="panel">
    <div id="widget" class="hidden">
      <div id="widget-header">
        <div>
          <div id="widget-route">—</div>
          <div id="widget-headsign"></div>
        </div>
        <div id="widget-status"></div>
      </div>
      <div id="widget-timer">
        <div class="timer-block">
          <div id="leave-num" class="timer-num">—</div>
          <div class="timer-label">Leave in (min)</div>
        </div>
        <div class="timer-divider">·</div>
        <div class="timer-block">
          <div id="bus-num" class="timer-num" style="font-size:34px;color:var(--muted)">—</div>
          <div class="timer-label">Bus arrives</div>
        </div>
        <div class="timer-divider">·</div>
        <div class="timer-block">
          <div id="walk-num" class="timer-num" style="font-size:28px;color:var(--muted)">3</div>
          <div class="timer-label">Walk (min)</div>
        </div>
      </div>
      <div id="widget-footer"></div>
    </div>
    <div id="widget-loading" class="hidden">Checking buses…</div>
    <div id="widget-empty" class="hidden"></div>
    <div id="next-buses" class="hidden"></div>
    <div id="stop-picker">
      <div class="stop-icon">🚏</div>
      <div>
        <div id="stop-picker-text">Tap a stop on the map</div>
        <div id="stop-picker-sub">or search an address above</div>
      </div>
    </div>
  </div>
</div>

<!-- Recenter button (walk mode only) -->
<button id="recenter-btn" title="Re-center on my location">⊕</button>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const REFRESH_MS    = 30_000;
const WALK_DEFAULT  = 3;
const COOP_CENTER   = [-73.8321, 40.8736];
const COOP_BOUNDS   = [[-73.858, 40.860], [-73.808, 40.888]];

// ── STATE ─────────────────────────────────────────────────────────────────────
let map, selectedStop = null, selectedRoute = null;
let widgetTimer = null, countdownTimer = null;
let currentWidget = null;

// Walk tracker state
let walkMode     = false;
let walkActive   = false;
let walkCoords   = [];     // [[lng,lat], ...]
let walkStartTS  = null;
let walkDurTimer = null;
let walkFollowing = true;
let walkDotMarker = null;
let savedWalks   = [];     // loaded from localStorage

const COLORS = ['#22c55e','#4f8dff','#f59e0b','#7c5cfc','#ef4444','#06b6d4','#e879f9','#fb923c'];

// ── MAP INIT ──────────────────────────────────────────────────────────────────
async function initMap() {
  const r = await fetch('/api/mapboxtoken');
  const { token } = await r.json();
  mapboxgl.accessToken = token;

  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [-73.886, 40.865],
    zoom: 13.5,
    attributionControl: false,
  });

  map.addControl(new mapboxgl.GeolocateControl({
    positionOptions: { enableHighAccuracy: true },
    trackUserLocation: false,  // we handle tracking in walk mode
  }), 'top-right');

  map.on('load', () => {
    loadStops();
    loadSavedWalks();
    initWalkLayers();
  });
}

// ── WALK LAYERS ───────────────────────────────────────────────────────────────
function initWalkLayers() {
  // Active trail source + layer
  map.addSource('walk-active', {
    type: 'geojson',
    data: { type: 'Feature', geometry: { type: 'LineString', coordinates: [] } }
  });
  map.addLayer({
    id: 'walk-active-line',
    type: 'line',
    source: 'walk-active',
    layout: { 'line-cap': 'round', 'line-join': 'round' },
    paint: { 'line-color': '#22c55e', 'line-width': 5, 'line-opacity': 0.9,
             'line-blur': 1 }
  });

  // Saved walks source + layers (rendered as faded lines)
  map.addSource('walk-saved', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: [] }
  });
  map.addLayer({
    id: 'walk-saved-lines',
    type: 'line',
    source: 'walk-saved',
    layout: { 'line-cap': 'round', 'line-join': 'round' },
    paint: { 'line-color': ['get', 'color'], 'line-width': 3, 'line-opacity': 0.45 }
  });

  renderSavedWalkLines();
}

// ── SAVED WALKS ───────────────────────────────────────────────────────────────
function loadSavedWalks() {
  try {
    savedWalks = JSON.parse(localStorage.getItem('tt_walks') || '[]');
  } catch { savedWalks = []; }
}

function saveWalk(coords, stats) {
  const walk = { coords, stats, ts: Date.now() };
  savedWalks.unshift(walk);
  if (savedWalks.length > 8) savedWalks.pop();
  try { localStorage.setItem('tt_walks', JSON.stringify(savedWalks)); } catch {}
  renderSavedWalkLines();
  renderHistoryChips();
}

function renderSavedWalkLines() {
  if (!map.getSource('walk-saved')) return;
  const features = savedWalks.map((w, i) => ({
    type: 'Feature',
    properties: { color: COLORS[(i + 1) % COLORS.length] },
    geometry: { type: 'LineString', coordinates: w.coords }
  }));
  map.getSource('walk-saved').setData({ type: 'FeatureCollection', features });
}

function renderHistoryChips() {
  const el = document.getElementById('walk-history');
  el.innerHTML = '';
  savedWalks.forEach((w, i) => {
    const date = new Date(w.ts);
    const label = `${date.getMonth()+1}/${date.getDate()} · ${w.stats.dist}mi`;
    const chip = document.createElement('div');
    chip.className = 'history-chip';
    chip.textContent = label;
    chip.addEventListener('click', () => zoomToWalk(w));
    el.appendChild(chip);
  });
}

function zoomToWalk(walk) {
  if (!walk.coords.length) return;
  const lngs = walk.coords.map(c => c[0]);
  const lats = walk.coords.map(c => c[1]);
  map.fitBounds([
    [Math.min(...lngs)-0.002, Math.min(...lats)-0.001],
    [Math.max(...lngs)+0.002, Math.max(...lats)+0.001]
  ], { padding: 60, duration: 600 });
}

// ── WALK MODE TOGGLE ──────────────────────────────────────────────────────────
document.getElementById('walk-mode-btn').addEventListener('click', () => {
  walkMode = !walkMode;
  document.getElementById('walk-mode-btn').classList.toggle('active', walkMode);
  document.getElementById('walk-overlay').classList.toggle('visible', walkMode);
  document.getElementById('panel').classList.toggle('walk-mode', walkMode);

  if (walkMode) {
    // Zoom to Coop City when entering walk mode
    map.fitBounds(COOP_BOUNDS, { padding: 40, duration: 700 });
    renderHistoryChips();
  } else {
    // Exit walk mode — stop any active walk
    if (walkActive) stopWalk(false);
    map.flyTo({ center: [-73.886, 40.865], zoom: 13.5, duration: 600 });
  }
});

// ── WALK CONTROLS ─────────────────────────────────────────────────────────────
document.getElementById('walk-start-btn').addEventListener('click', startWalk);
document.getElementById('walk-stop-btn').addEventListener('click', () => stopWalk(true));
document.getElementById('recenter-btn').addEventListener('click', () => {
  walkFollowing = true;
  if (walkCoords.length) {
    const last = walkCoords[walkCoords.length - 1];
    map.flyTo({ center: last, zoom: 16, duration: 400 });
  }
});

function startWalk() {
  if (!navigator.geolocation) { alert('GPS not available on this device.'); return; }
  walkActive = true;
  walkCoords = [];
  walkStartTS = Date.now();
  walkFollowing = true;

  document.getElementById('walk-start-btn').disabled = true;
  document.getElementById('walk-stop-btn').disabled = false;
  document.getElementById('recenter-btn').classList.add('visible');

  // Clear active trail
  map.getSource('walk-active').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: [] } });

  // Create GPS dot marker
  if (walkDotMarker) { walkDotMarker.remove(); walkDotMarker = null; }
  const dotEl = document.createElement('div');
  dotEl.className = 'walk-dot';
  walkDotMarker = new mapboxgl.Marker({ element: dotEl, anchor: 'center' })
    .setLngLat(COOP_CENTER)
    .addTo(map);

  // Start duration ticker
  walkDurTimer = setInterval(updateDuration, 1000);

  // Start GPS watch
  walkWatchId = navigator.geolocation.watchPosition(onGPSUpdate, null, {
    enableHighAccuracy: true, maximumAge: 2000, timeout: 10000
  });
}

let walkWatchId = null;
let lastLat = null, lastLng = null;

function onGPSUpdate(pos) {
  if (!walkActive) return;
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;

  // Jitter filter: ignore jumps < 2m and > 50m
  if (lastLat !== null) {
    const d = haversineFt(lastLat, lastLng, lat, lng);
    if (d < 6.5 || d > 164) return;  // ~2m and ~50m in feet
  }
  lastLat = lat; lastLng = lng;

  const coord = [lng, lat];
  walkCoords.push(coord);

  // Move dot
  walkDotMarker.setLngLat(coord);

  // Update trail
  map.getSource('walk-active').setData({
    type: 'Feature', geometry: { type: 'LineString', coordinates: walkCoords }
  });

  // Auto-follow
  if (walkFollowing) {
    map.easeTo({ center: coord, zoom: Math.max(map.getZoom(), 16), duration: 300 });
  }

  // Stop following if user pans
  updateStats();
}

function stopWalk(save) {
  walkActive = false;
  clearInterval(walkDurTimer);
  if (walkWatchId !== null) { navigator.geolocation.clearWatch(walkWatchId); walkWatchId = null; }
  if (walkDotMarker) { walkDotMarker.remove(); walkDotMarker = null; }

  document.getElementById('walk-start-btn').disabled = false;
  document.getElementById('walk-stop-btn').disabled = true;
  document.getElementById('recenter-btn').classList.remove('visible');

  if (save && walkCoords.length > 1) {
    const stats = getCurrentStats();
    saveWalk([...walkCoords], stats);
    // Fade active trail (it becomes a saved walk line)
    map.getSource('walk-active').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: [] } });
  }

  lastLat = null; lastLng = null;
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const s = getCurrentStats();
  document.getElementById('stat-dist').textContent = s.dist;
  document.getElementById('stat-steps').textContent = s.steps;
  document.getElementById('stat-pace').textContent = s.pace;
}

function updateDuration() {
  if (!walkStartTS) return;
  const elapsed = Math.floor((Date.now() - walkStartTS) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  document.getElementById('stat-dur').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  updateStats();
}

function getCurrentStats() {
  let totalFt = 0;
  for (let i = 1; i < walkCoords.length; i++) {
    totalFt += haversineFt(walkCoords[i-1][1], walkCoords[i-1][0], walkCoords[i][1], walkCoords[i][0]);
  }
  const miles = totalFt / 5280;
  const elapsedMin = walkStartTS ? (Date.now() - walkStartTS) / 60000 : 0;
  const pace = miles > 0.05 && elapsedMin > 0 ? (elapsedMin / miles) : null;
  const paceStr = pace ? `${Math.floor(pace)}:${Math.round((pace % 1)*60).toString().padStart(2,'0')}` : '—';
  const steps = Math.round(miles * 2200);
  return {
    dist: miles.toFixed(2),
    pace: paceStr,
    steps: steps.toLocaleString(),
  };
}

// Detect map drag to pause auto-follow
let followDebounce;
document.addEventListener('DOMContentLoaded', () => {});
// We'll attach this after map is ready (see initMap load event)

// ── MATH ──────────────────────────────────────────────────────────────────────
function haversineFt(lat1, lng1, lat2, lng2) {
  const R = 20902231; // Earth radius in feet
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

// ── STOPS ─────────────────────────────────────────────────────────────────────
async function loadStops() {
  try {
    const res = await fetch('/api/stops');
    const data = await res.json();
    const stops = data.stops || data;
    const routeColors = {
      'Bx1':'#4f8dff','Bx2':'#4f8dff','Bx12':'#7c5cfc','Bx13':'#7c5cfc',
      'Bx17':'#22c55e','Bx19':'#22c55e','Bx28':'#f59e0b','Bx38':'#f59e0b',
      'Bx39':'#ef4444','Bx41':'#ef4444',
    };
    stops.forEach(stop => {
      const color = routeColors[stop.routes?.[0]] || '#8888a0';
      const el = document.createElement('div');
      el.style.cssText = `width:12px;height:12px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,0.4);cursor:pointer;transition:transform 0.15s;`;
      el.addEventListener('mouseenter', () => el.style.transform = 'scale(1.6)');
      el.addEventListener('mouseleave', () => el.style.transform = 'scale(1)');
      const marker = new mapboxgl.Marker({ element: el })
        .setLngLat([stop.lng || stop.longitude, stop.lat || stop.latitude])
        .addTo(map);
      marker.getElement().addEventListener('click', () => {
        if (walkMode) return; // don't select stops in walk mode
        selectStop(stop);
      });
    });
  } catch (e) { console.warn('stops load error', e.message); }
}

// ── STOP SELECTION ────────────────────────────────────────────────────────────
function selectStop(stop) {
  selectedStop = stop.stopId || stop.id || stop.stop_id;
  selectedRoute = stop.routes?.[0] || stop.route;
  document.getElementById('stop-picker-text').textContent = stop.name || stop.stop_name || selectedStop;
  document.getElementById('stop-picker-sub').textContent = (stop.routes || [stop.route]).filter(Boolean).join(' · ');
  map.flyTo({ center: [stop.lng || stop.longitude, stop.lat || stop.latitude], zoom: 15, duration: 600 });
  refreshWidget();
  if (widgetTimer) clearInterval(widgetTimer);
  widgetTimer = setInterval(refreshWidget, REFRESH_MS);
}

// ── WIDGET ────────────────────────────────────────────────────────────────────
async function refreshWidget() {
  if (!selectedStop || !selectedRoute) return;
  showLoading(true);
  try {
    const r = await fetch(`/api/widget?stop=${selectedStop}&route=${encodeURIComponent(selectedRoute)}&walk_mins=${WALK_DEFAULT}`);
    const data = await r.json();
    renderWidget(data);
  } catch (e) {
    showEmpty('Could not load bus times. Check your connection.');
  } finally { showLoading(false); }
}

function renderWidget(data) {
  currentWidget = data;
  const w = document.getElementById('widget');
  const leaveNum = document.getElementById('leave-num');
  const busNum = document.getElementById('bus-num');
  const walkNum = document.getElementById('walk-num');
  const routeEl = document.getElementById('widget-route');
  const headsignEl = document.getElementById('widget-headsign');
  const statusEl = document.getElementById('widget-status');
  const footerEl = document.getElementById('widget-footer');
  const emptyEl = document.getElementById('widget-empty');
  const nextEl = document.getElementById('next-buses');
  emptyEl.classList.add('hidden');
  if (data.status === 'no_buses') {
    w.classList.add('hidden'); nextEl.classList.add('hidden');
    emptyEl.classList.remove('hidden');
    emptyEl.textContent = 'No buses found right now for ' + data.route + '. Try again in a minute.';
    return;
  }
  const leave = data.leave_in_mins ?? 0;
  const busIn = data.next_bus_mins ?? 0;
  const walk  = data.walk_mins ?? WALK_DEFAULT;
  w.classList.remove('hidden','urgent','soon','good');
  leaveNum.classList.remove('urgent','soon','good');
  if (leave <= 1) { w.classList.add('urgent'); leaveNum.classList.add('urgent'); }
  else if (leave <= 4) { w.classList.add('soon'); leaveNum.classList.add('soon'); }
  else { w.classList.add('good'); leaveNum.classList.add('good'); }
  leaveNum.textContent = leave <= 0 ? 'NOW' : leave;
  busNum.textContent = busIn + 'm';
  walkNum.textContent = walk + 'm';
  routeEl.textContent = data.route;
  headsignEl.textContent = data.headsign ? ('→ ' + data.headsign) : '';
  const updatedSecs = data.last_updated ? Math.round((Date.now() - new Date(data.last_updated)) / 1000) : null;
  statusEl.textContent = updatedSecs !== null ? ('Updated ' + updatedSecs + 's ago') : '';
  footerEl.innerHTML = '';
  const nb = data.next_bus;
  if (nb?.distance_label) addPill(footerEl, '📍 ' + nb.distance_label);
  if (nb?.stops_away != null) addPill(footerEl, nb.stops_away + ' stops away');
  if (data.bias_active) addPill(footerEl, '🧠 AI-adjusted', true);
  if (nb?.bias_sample_count) addPill(footerEl, nb.bias_sample_count + ' trips learned');
  const subs = data.subsequent_buses || [];
  nextEl.innerHTML = '';
  nextEl.classList.toggle('hidden', subs.length === 0);
  subs.forEach(b => {
    const card = document.createElement('div');
    card.className = 'next-bus-card';
    card.innerHTML = `<div class="nb-mins">${b.mins_away}m</div><div class="nb-label">Next bus</div><div class="nb-dist">${b.distance_label || ''}</div>`;
    nextEl.appendChild(card);
  });
  startCountdown(data.next_bus?.adjusted_arrival);
}

function startCountdown(arrivalISO) {
  if (countdownTimer) clearInterval(countdownTimer);
  if (!arrivalISO) return;
  const arrival = new Date(arrivalISO);
  countdownTimer = setInterval(() => {
    if (!currentWidget) return;
    const now = new Date();
    const busIn  = Math.max(0, Math.round((arrival - now) / 60000));
    const leaveIn = Math.max(0, busIn - WALK_DEFAULT);
    const leaveNum = document.getElementById('leave-num');
    const busNum   = document.getElementById('bus-num');
    const w = document.getElementById('widget');
    leaveNum.textContent = leaveIn <= 0 ? 'NOW' : leaveIn;
    busNum.textContent   = busIn + 'm';
    w.classList.remove('urgent','soon','good');
    leaveNum.classList.remove('urgent','soon','good');
    if (leaveIn <= 1) { w.classList.add('urgent'); leaveNum.classList.add('urgent'); }
    else if (leaveIn <= 4) { w.classList.add('soon'); leaveNum.classList.add('soon'); }
    else { w.classList.add('good'); leaveNum.classList.add('good'); }
  }, 10_000);
}

function addPill(parent, text, active = false) {
  const p = document.createElement('div');
  p.className = 'pill' + (active ? ' active' : '');
  p.textContent = text;
  parent.appendChild(p);
}
function showLoading(on) {
  document.getElementById('widget-loading').classList.toggle('hidden', !on);
  if (on) document.getElementById('widget').classList.add('hidden');
}
function showEmpty(msg) {
  const el = document.getElementById('widget-empty');
  el.textContent = msg;
  el.classList.remove('hidden');
  document.getElementById('widget').classList.add('hidden');
}

// ── ADDRESS SEARCH ────────────────────────────────────────────────────────────
const searchEl  = document.getElementById('search');
const resultsEl = document.getElementById('search-results');
let searchTimer;
searchEl.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchEl.value.trim();
  if (q.length < 3) { resultsEl.style.display = 'none'; return; }
  searchTimer = setTimeout(() => doSearch(q), 350);
});
searchEl.addEventListener('blur', () => setTimeout(() => resultsEl.style.display = 'none', 200));

async function doSearch(q) {
  try {
    const tkRes = await fetch('/api/mapboxtoken');
    const { token } = await tkRes.json();
    const r = await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(q)}.json?access_token=${token}&country=US&proximity=-73.886,40.865&limit=5`);
    const d = await r.json();
    renderSearchResults(d.features || []);
  } catch { resultsEl.style.display = 'none'; }
}
function renderSearchResults(features) {
  resultsEl.innerHTML = '';
  if (!features.length) { resultsEl.style.display = 'none'; return; }
  features.forEach(f => {
    const item = document.createElement('div');
    item.className = 'sr-item';
    item.textContent = f.place_name;
    item.addEventListener('click', () => {
      map.flyTo({ center: f.center, zoom: 15, duration: 600 });
      searchEl.value = f.place_name;
      resultsEl.style.display = 'none';
    });
    resultsEl.appendChild(item);
  });
  resultsEl.style.display = 'block';
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
initMap();
</script>
