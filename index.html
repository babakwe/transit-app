<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TownTrip</title>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
      color: #111827;
      overflow: hidden;
    }

    #map {
      position: fixed;
      inset: 0;
    }

    #topbar {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #brand {
      height: 42px;
      min-width: 42px;
      border-radius: 12px;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: #2563eb;
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    #searchWrap {
      flex: 1;
      position: relative;
    }

    #searchInput {
      width: 100%;
      height: 42px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 12px;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      padding: 0 14px;
      font-size: 14px;
      outline: none;
      backdrop-filter: blur(10px);
    }

    #searchResults {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.98);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 12px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.12);
      overflow: hidden;
      display: none;
    }

    .search-item {
      padding: 10px 12px;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .search-item:last-child {
      border-bottom: none;
    }

    .search-item:hover {
      background: #f8fafc;
    }

    #weatherChip {
      min-width: 86px;
      height: 42px;
      border-radius: 12px;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 700;
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    #bottomCard {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 20;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.14);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    #cardHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    #cardTitle {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    #cardToggle {
      appearance: none;
      border: 1px solid rgba(0,0,0,0.08);
      background: #fff;
      border-radius: 10px;
      height: 32px;
      min-width: 32px;
      padding: 0 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    #cardBody {
      padding: 12px 14px 14px;
    }

    #bottomCard.collapsed #cardBody {
      display: none;
    }

    .row {
      margin-bottom: 10px;
    }

    .label {
      font-size: 11px;
      font-weight: 800;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 5px;
    }

    .value {
      font-size: 13px;
      line-height: 1.45;
      color: #111827;
    }

    .muted {
      color: #6b7280;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
      margin-top: 8px;
    }

    .metric {
      background: #f8fafc;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .metric-label {
      font-size: 11px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .action-btn {
      appearance: none;
      border: 1px solid rgba(0,0,0,0.08);
      background: #fff;
      color: #111827;
      border-radius: 12px;
      height: 38px;
      padding: 0 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    .action-btn.primary {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-line;
    }

    .good { color: #15803d; font-weight: 700; }
    .bad { color: #b91c1c; font-weight: 700; }

    .live-marker {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #16a34a;
      border: 3px solid white;
      box-shadow: 0 0 0 0 rgba(22,163,74,0.55);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(22,163,74,0.55); }
      70%  { box-shadow: 0 0 0 14px rgba(22,163,74,0); }
      100% { box-shadow: 0 0 0 0 rgba(22,163,74,0); }
    }

    @media (max-width: 700px) {
      #topbar {
        gap: 8px;
      }

      #weatherChip {
        min-width: 72px;
        padding: 0 10px;
        font-size: 12px;
      }

      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="topbar">
    <div id="brand">TT</div>

    <div id="searchWrap">
      <input id="searchInput" type="text" placeholder="Enter destination..." autocomplete="off" />
      <div id="searchResults"></div>
    </div>

    <div id="weatherChip">--°</div>
  </div>

  <div id="bottomCard">
    <div id="cardHeader">
      <div id="cardTitle">TownTrip</div>
      <button id="cardToggle">Hide</button>
    </div>

    <div id="cardBody">
      <div class="row">
        <div class="label">Status</div>
        <div id="liveStatus" class="value muted">Requesting live location…</div>
      </div>

      <div class="row">
        <div class="label">Destination</div>
        <div id="destinationText" class="value muted">No destination selected yet.</div>
      </div>

      <div class="grid">
        <div class="metric">
          <div class="metric-label">Elevation</div>
          <div id="elevationVal" class="metric-value">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Pointgrade</div>
          <div id="pointgradeVal" class="metric-value">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Distance</div>
          <div id="distanceVal" class="metric-value">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Pathgrade</div>
          <div id="pathgradeVal" class="metric-value">—</div>
        </div>
      </div>

      <div class="row" style="margin-top:12px;">
        <div class="label">Live coordinates</div>
        <div id="liveCoords" class="mono muted">No live GPS point yet.</div>
      </div>

      <div class="actions">
        <button id="centerBtn" class="action-btn primary">Center on me</button>
        <button id="clearTrackBtn" class="action-btn">Clear track</button>
        <button id="kingsbridgeBtn" class="action-btn">Kingsbridge</button>
        <button id="coopBtn" class="action-btn">Co-op City</button>
      </div>
    </div>
  </div>

  <script>
    let map;
    let liveWatchId = null;
    let liveMarker = null;
    let liveCoords = [];
    let lastAcceptedCoord = null;
    let destination = null;
    let destinationMarker = null;
    let destinationLineSet = false;

    const TRACK_STORAGE_KEY = "towntrip_live_track_v3";
    const KINGSBRIDGE = [-73.9035, 40.8817];
    const COOP_CITY = [-73.8292, 40.8748];

    function fmt(n, digits = 2) {
      return Number.isFinite(n) ? n.toFixed(digits) : "—";
    }

    function offsetLngLat([lng, lat], eastMeters, northMeters) {
      const dLat = northMeters / 111320;
      const dLng = eastMeters / (111320 * Math.cos(lat * Math.PI / 180));
      return [lng + dLng, lat + dLat];
    }

    function haversineMeters(lng1, lat1, lng2, lat2) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                Math.sin(dLng / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }

    function interpolate(a, b, t) {
      return [
        a[0] + (b[0] - a[0]) * t,
        a[1] + (b[1] - a[1]) * t
      ];
    }

    function bearingFromVector(eastSlope, northSlope) {
      if (!Number.isFinite(eastSlope) || !Number.isFinite(northSlope)) return "—";
      const angle = Math.atan2(eastSlope, northSlope) * 180 / Math.PI;
      const normalized = (angle + 360) % 360;
      const dirs = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
      const idx = Math.round(normalized / 45) % 8;
      return dirs[idx];
    }

    function makeLiveMarker() {
      const el = document.createElement("div");
      el.className = "live-marker";
      return el;
    }

    function makeDestinationMarker() {
      const el = document.createElement("div");
      el.style.width = "16px";
      el.style.height = "16px";
      el.style.borderRadius = "50%";
      el.style.background = "#2563eb";
      el.style.border = "3px solid white";
      el.style.boxShadow = "0 2px 8px rgba(0,0,0,0.25)";
      return el;
    }

    async function getElevation(coord) {
      const elev = map.queryTerrainElevation(coord, { exaggerated: false });
      return elev == null ? null : elev;
    }

    async function getPointgrade(coord) {
      const sample = 20;
      const west  = offsetLngLat(coord, -sample, 0);
      const east  = offsetLngLat(coord,  sample, 0);
      const south = offsetLngLat(coord, 0, -sample);
      const north = offsetLngLat(coord, 0,  sample);

      const [eW, eE, eS, eN, eC] = await Promise.all([
        getElevation(west),
        getElevation(east),
        getElevation(south),
        getElevation(north),
        getElevation(coord)
      ]);

      if ([eW, eE, eS, eN, eC].some(v => v == null)) {
        return { elevation: eC, slopePct: null, uphillDir: "—" };
      }

      const eastSlope  = (eE - eW) / (2 * sample);
      const northSlope = (eN - eS) / (2 * sample);
      const slope = Math.sqrt(eastSlope ** 2 + northSlope ** 2);

      return {
        elevation: eC,
        slopePct: slope * 100,
        uphillDir: bearingFromVector(eastSlope, northSlope)
      };
    }

    async function getPathgrade(a, b) {
      const samples = 30;
      let totalDistance = 0;
      let totalGain = 0;
      let totalLoss = 0;
      let burden = 0;

      let prevCoord = a;
      let prevElev = await getElevation(a);
      if (prevElev == null) return null;

      for (let i = 1; i <= samples; i++) {
        const t = i / samples;
        const coord = interpolate(a, b, t);
        const elev = await getElevation(coord);
        if (elev == null) return null;

        const segDist = haversineMeters(prevCoord[0], prevCoord[1], coord[0], coord[1]);
        const delta = elev - prevElev;
        const grade = segDist > 0 ? delta / segDist : 0;

        totalDistance += segDist;
        if (delta > 0) totalGain += delta;
        if (delta < 0) totalLoss += Math.abs(delta);

        const uphillPenalty = Math.max(0, grade) * 6.0;
        const downhillPenalty = Math.max(0, -grade) * 2.0;
        const multiplier = 1 + uphillPenalty + downhillPenalty;

        burden += segDist * multiplier;

        prevCoord = coord;
        prevElev = elev;
      }

      return {
        distanceMeters: totalDistance,
        gainMeters: totalGain,
        lossMeters: totalLoss,
        pathgrade: burden
      };
    }

    function loadSavedTrack() {
      try {
        const raw = localStorage.getItem(TRACK_STORAGE_KEY);
        liveCoords = raw ? JSON.parse(raw) : [];
      } catch {
        liveCoords = [];
      }
    }

    function saveTrack() {
      try {
        localStorage.setItem(TRACK_STORAGE_KEY, JSON.stringify(liveCoords));
      } catch (e) {
        console.warn("Could not save local track", e);
      }
    }

    function updateLiveTrackLayer() {
      if (!map.getSource("live-track")) return;
      map.getSource("live-track").setData({
        type: "Feature",
        geometry: {
          type: "LineString",
          coordinates: liveCoords
        }
      });
    }

    function clearSavedTrack() {
      liveCoords = [];
      lastAcceptedCoord = null;
      localStorage.removeItem(TRACK_STORAGE_KEY);
      updateLiveTrackLayer();
      document.getElementById("liveCoords").textContent = "No live GPS point yet.";
    }

    async function updateLiveInfo(coord, accuracy) {
      const pg = await getPointgrade(coord);

      document.getElementById("elevationVal").textContent =
        pg.elevation == null ? "—" : `${fmt(pg.elevation, 1)}m`;

      document.getElementById("pointgradeVal").textContent =
        pg.slopePct == null ? "—" : `${fmt(pg.slopePct, 2)}%`;

      document.getElementById("liveCoords").innerHTML = `
Lng ${fmt(coord[0], 5)}, Lat ${fmt(coord[1], 5)}
${pg.uphillDir === "—" ? "" : "\nUphill direction: " + pg.uphillDir}
Accuracy ${fmt(accuracy, 1)}m
      `.trim();

      if (destination) {
        await updateDestinationMetrics(coord, destination.center);
      }
    }

    async function updateDestinationMetrics(fromCoord, toCoord) {
      const path = await getPathgrade(fromCoord, toCoord);
      if (!path) return;

      document.getElementById("distanceVal").textContent =
        `${fmt(path.distanceMeters, 0)}m`;

      document.getElementById("pathgradeVal").textContent =
        `${fmt(path.pathgrade, 0)}`;

      map.getSource("destination-line").setData({
        type: "Feature",
        geometry: {
          type: "LineString",
          coordinates: [fromCoord, toCoord]
        }
      });
    }

    async function doSearch(q) {
      try {
        const tkRes = await fetch("/api/mapboxtoken");
        const { token } = await tkRes.json();

        const r = await fetch(
          `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(q)}.json?access_token=${token}&country=US&proximity=-73.9035,40.8817&limit=5`
        );
        const d = await r.json();
        renderSearchResults(d.features || []);
      } catch {
        document.getElementById("searchResults").style.display = "none";
      }
    }

    function renderSearchResults(features) {
      const box = document.getElementById("searchResults");
      box.innerHTML = "";

      if (!features.length) {
        box.style.display = "none";
        return;
      }

      features.forEach(f => {
        const item = document.createElement("div");
        item.className = "search-item";
        item.textContent = f.place_name;
        item.addEventListener("click", async () => {
          destination = {
            name: f.place_name,
            center: f.center
          };

          document.getElementById("destinationText").textContent = f.place_name;
          document.getElementById("searchInput").value = f.place_name;
          box.style.display = "none";

          if (destinationMarker) destinationMarker.remove();
          destinationMarker = new mapboxgl.Marker({ element: makeDestinationMarker() })
            .setLngLat(f.center)
            .addTo(map);

          map.flyTo({
            center: f.center,
            zoom: 15,
            duration: 700
          });

          if (liveMarker) {
            const lngLat = liveMarker.getLngLat();
            await updateDestinationMetrics([lngLat.lng, lngLat.lat], f.center);

            const bounds = new mapboxgl.LngLatBounds();
            bounds.extend([lngLat.lng, lngLat.lat]);
            bounds.extend(f.center);
            map.fitBounds(bounds, { padding: 80, duration: 700 });
          }
        });
        box.appendChild(item);
      });

      box.style.display = "block";
    }

    function startLiveLocation() {
      if (!navigator.geolocation) {
        document.getElementById("liveStatus").innerHTML =
          `<span class="bad">This device does not support geolocation.</span>`;
        return;
      }

      if (liveWatchId !== null) return;

      document.getElementById("liveStatus").innerHTML =
        `<span class="good">Starting live tracking…</span>`;

      liveWatchId = navigator.geolocation.watchPosition(
        async (pos) => {
          const lng = pos.coords.longitude;
          const lat = pos.coords.latitude;
          const accuracy = pos.coords.accuracy;
          const coord = [lng, lat];

          if (!liveMarker) {
            liveMarker = new mapboxgl.Marker({ element: makeLiveMarker(), anchor: "center" })
              .setLngLat(coord)
              .addTo(map);

            map.flyTo({
              center: coord,
              zoom: 16,
              pitch: 60,
              duration: 700
            });
          } else {
            liveMarker.setLngLat(coord);
          }

          let acceptPoint = true;
          if (lastAcceptedCoord) {
            const d = haversineMeters(
              lastAcceptedCoord[0], lastAcceptedCoord[1],
              coord[0], coord[1]
            );
            if (d < 3) acceptPoint = false;
          }

          if (acceptPoint) {
            liveCoords.push(coord);
            if (liveCoords.length > 5000) {
              liveCoords = liveCoords.slice(-5000);
            }
            lastAcceptedCoord = coord;
            saveTrack();
            updateLiveTrackLayer();
          }

          document.getElementById("liveStatus").innerHTML =
            `<span class="good">Live tracking on.</span> GPS accuracy ${fmt(accuracy, 1)}m.`;

          await updateLiveInfo(coord, accuracy);
        },
        (err) => {
          document.getElementById("liveStatus").innerHTML =
            `<span class="bad">Location error:</span> ${err.message}`;
        },
        {
          enableHighAccuracy: true,
          maximumAge: 2000,
          timeout: 10000
        }
      );
    }

    async function loadWeather() {
      if (!navigator.geolocation) return;

      navigator.geolocation.getCurrentPosition(async (pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        try {
          const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weather_code&temperature_unit=fahrenheit`);
          const data = await r.json();
          const temp = data?.current?.temperature_2m;
          document.getElementById("weatherChip").textContent =
            Number.isFinite(temp) ? `${Math.round(temp)}°` : "--°";
        } catch {
          document.getElementById("weatherChip").textContent = "--°";
        }
      });
    }

    function setupSearch() {
      const input = document.getElementById("searchInput");
      let timer;

      input.addEventListener("input", () => {
        clearTimeout(timer);
        const q = input.value.trim();
        if (q.length < 3) {
          document.getElementById("searchResults").style.display = "none";
          return;
        }
        timer = setTimeout(() => doSearch(q), 350);
      });

      input.addEventListener("blur", () => {
        setTimeout(() => {
          document.getElementById("searchResults").style.display = "none";
        }, 200);
      });
    }

    function setupCardToggle() {
      const card = document.getElementById("bottomCard");
      const btn = document.getElementById("cardToggle");

      function sync() {
        btn.textContent = card.classList.contains("collapsed") ? "Show" : "Hide";
      }

      btn.addEventListener("click", () => {
        card.classList.toggle("collapsed");
        sync();
      });

      sync();
    }

    async function initMap() {
      const r = await fetch("/api/mapboxtoken");
      const { token } = await r.json();
      mapboxgl.accessToken = token;

      map = new mapboxgl.Map({
        container: "map",
        style: "mapbox://styles/mapbox/light-v11",
        center: KINGSBRIDGE,
        zoom: 13.8,
        pitch: 55,
        bearing: -12,
        attributionControl: true
      });

      map.addControl(new mapboxgl.NavigationControl(), "top-right");

      map.on("load", () => {
        map.addSource("mapbox-dem", {
          type: "raster-dem",
          url: "mapbox://mapbox.mapbox-terrain-dem-v1",
          tileSize: 512,
          maxzoom: 14
        });

        map.setTerrain({
          source: "mapbox-dem",
          exaggeration: 1.15
        });

        map.addLayer({
          id: "hillshade",
          type: "hillshade",
          source: "mapbox-dem",
          paint: {
            "hillshade-shadow-color": "#94a3b8",
            "hillshade-highlight-color": "#ffffff",
            "hillshade-accent-color": "#cbd5e1"
          }
        });

        loadSavedTrack();

        map.addSource("live-track", {
          type: "geojson",
          data: {
            type: "Feature",
            geometry: { type: "LineString", coordinates: liveCoords }
          }
        });

        map.addLayer({
          id: "live-track-layer",
          type: "line",
          source: "live-track",
          layout: {
            "line-cap": "round",
            "line-join": "round"
          },
          paint: {
            "line-color": "#111827",
            "line-width": 4,
            "line-opacity": 0.82
          }
        });

        map.addSource("destination-line", {
          type: "geojson",
          data: {
            type: "Feature",
            geometry: { type: "LineString", coordinates: [] }
          }
        });

        map.addLayer({
          id: "destination-line-layer",
          type: "line",
          source: "destination-line",
          layout: {
            "line-cap": "round",
            "line-join": "round"
          },
          paint: {
            "line-color": "#2563eb",
            "line-width": 4,
            "line-opacity": 0.9
          }
        });

        updateLiveTrackLayer();
        startLiveLocation();
        loadWeather();
      });

      document.getElementById("centerBtn").addEventListener("click", () => {
        if (liveMarker) {
          const lngLat = liveMarker.getLngLat();
          map.flyTo({
            center: [lngLat.lng, lngLat.lat],
            zoom: Math.max(map.getZoom(), 16),
            pitch: 60,
            duration: 700
          });
        }
      });

      document.getElementById("clearTrackBtn").addEventListener("click", clearSavedTrack);

      document.getElementById("kingsbridgeBtn").addEventListener("click", () => {
        map.flyTo({
          center: KINGSBRIDGE,
          zoom: 14.2,
          pitch: 60,
          bearing: -18,
          duration: 900
        });
      });

      document.getElementById("coopBtn").addEventListener("click", () => {
        map.flyTo({
          center: COOP_CITY,
          zoom: 14.2,
          pitch: 50,
          bearing: 0,
          duration: 900
        });
      });

      setupSearch();
      setupCardToggle();
    }

    initMap();
  </script>
</body>
</html>
