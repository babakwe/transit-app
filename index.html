<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TownTrip</title>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #map {
      position: fixed;
      inset: 0;
    }

    #topbar {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
    }

    #searchStack {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .searchRow {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 8px;
      align-items: center;
      position: relative;
    }

    .startBtn {
      height: 42px;
      width: 42px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 12px;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
      backdrop-filter: blur(10px);
      user-select: none;
    }

    .startBtn:hover {
      background: #f8fafc;
    }

    .searchWrap {
      position: relative;
    }

    .searchInput {
      width: 100%;
      height: 42px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 12px;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      padding: 0 12px;
      font-size: 14px;
      outline: none;
      backdrop-filter: blur(10px);
    }

    .searchResults {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.98);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 12px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.12);
      overflow: hidden;
      display: none;
      max-height: 220px;
      overflow-y: auto;
      z-index: 40;
    }

    .search-item {
      padding: 10px 12px;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      background: white;
    }

    .search-item:last-child { border-bottom: none; }
    .search-item:hover { background: #f8fafc; }

    #rightTopControls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
    }

    #weatherChip {
      min-width: 74px;
      height: 36px;
      border-radius: 999px;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 10px;
      font-size: 13px;
      font-weight: 700;
      backdrop-filter: blur(10px);
    }

    #weatherIcon {
      font-size: 15px;
      line-height: 1;
    }

    #bottomCard {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 20;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.14);
      backdrop-filter: blur(10px);
      overflow: hidden;
      max-height: min(54vh, 520px);
    }

    #cardHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    #cardTitle {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    #cardToggle {
      appearance: none;
      border: 1px solid rgba(0,0,0,0.08);
      background: #fff;
      border-radius: 10px;
      height: 32px;
      min-width: 32px;
      padding: 0 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    #cardBody {
      padding: 12px 14px 14px;
      overflow: auto;
      max-height: calc(min(54vh, 520px) - 54px);
    }

    #bottomCard.collapsed #cardBody { display: none; }

    .row { margin-bottom: 10px; }

    .label {
      font-size: 11px;
      font-weight: 800;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 5px;
    }

    .value {
      font-size: 13px;
      line-height: 1.45;
      color: #111827;
    }

    .muted { color: #6b7280; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
      margin-top: 8px;
    }

    .metric {
      background: #f8fafc;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .metric-label {
      font-size: 11px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .action-btn {
      appearance: none;
      border: 1px solid rgba(0,0,0,0.08);
      background: #fff;
      color: #111827;
      border-radius: 12px;
      height: 38px;
      padding: 0 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    .action-btn.primary {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-line;
    }

    .good { color: #15803d; font-weight: 700; }
    .bad { color: #b91c1c; font-weight: 700; }

    #directionsPanel {
      margin-top: 12px;
      border-top: 1px solid rgba(0,0,0,0.08);
      padding-top: 12px;
    }

    #langSelect {
      width: 100%;
      height: 40px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.08);
      background: #fff;
      font-size: 14px;
      padding: 0 12px;
      margin-bottom: 10px;
    }

    .step {
      background: #f8fafc;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .step-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 4px;
    }

    .step-num {
      font-size: 11px;
      font-weight: 800;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .step-dist {
      font-size: 11px;
      color: #6b7280;
    }

    .step-text {
      font-size: 14px;
      line-height: 1.45;
    }

    .live-marker {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #16a34a;
      border: 3px solid #fff;
      box-shadow: 0 0 0 0 rgba(22,163,74,0.55);
      animation: pulse 1.8s infinite;
    }

    .pin-marker {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    .start-marker { background: #111827; }
    .dest-marker { background: #2563eb; }

    #styleToggle {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 25;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.10);
      background: rgba(255,255,255,0.96);
      box-shadow: 0 10px 28px rgba(0,0,0,0.14);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      user-select: none;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(22,163,74,0.55); }
      70%  { box-shadow: 0 0 0 14px rgba(22,163,74,0); }
      100% { box-shadow: 0 0 0 0 rgba(22,163,74,0); }
    }

    @media (max-width: 640px) {
      #weatherChip {
        min-width: 68px;
        font-size: 12px;
      }

      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="topbar">
    <div id="searchStack">
      <div class="searchRow">
        <button id="useMyLocationBtn" class="startBtn" title="Use my live location as start">▲</button>
        <div class="searchWrap">
          <input id="startInput" class="searchInput" type="text" placeholder="Start" autocomplete="off" />
          <div id="startResults" class="searchResults"></div>
        </div>
      </div>

      <div class="searchRow">
        <div class="startBtn" style="visibility:hidden;">▲</div>
        <div class="searchWrap">
          <input id="destInput" class="searchInput" type="text" placeholder="Destination" autocomplete="off" />
          <div id="destResults" class="searchResults"></div>
        </div>
      </div>
    </div>

    <div id="rightTopControls">
      <div id="weatherChip">
        <span id="weatherIcon">☁️</span>
        <span id="weatherTemp">--°</span>
      </div>
    </div>
  </div>

  <div id="bottomCard">
    <div id="cardHeader">
      <div id="cardTitle">TownTrip</div>
      <button id="cardToggle">Hide</button>
    </div>

    <div id="cardBody">
      <div class="row">
        <div class="label">Status</div>
        <div id="liveStatus" class="value muted">Requesting live location…</div>
      </div>

      <div class="row">
        <div class="label">Route</div>
        <div id="routeSummary" class="value muted">Choose a start and destination.</div>
      </div>

      <div class="grid">
        <div class="metric">
          <div class="metric-label">Route distance</div>
          <div id="distanceVal" class="metric-value">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Route time</div>
          <div id="durationVal" class="metric-value">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Elevation gain</div>
          <div id="gainVal" class="metric-value">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Pathgrade</div>
          <div id="pathgradeVal" class="metric-value">—</div>
        </div>
      </div>

      <div class="row" style="margin-top:12px;">
        <div class="label">Live coordinates</div>
        <div id="liveCoords" class="mono muted">No live GPS point yet.</div>
      </div>

      <div id="directionsPanel">
        <div class="label">Directions language</div>
        <select id="langSelect">
          <option value="en">English</option>
          <option value="fr">French</option>
          <option value="tw">Twi</option>
          <option value="wo">Wolof</option>
          <option value="pcm">Nigerian Pidgin</option>
        </select>

        <div class="label">Turn-by-turn directions</div>
        <div id="stepsContainer" class="muted">No directions yet.</div>
      </div>

      <div class="actions">
        <button id="swapBtn" class="action-btn">Swap</button>
        <button id="centerBtn" class="action-btn">Center on me</button>
        <button id="clearTrackBtn" class="action-btn">Clear track</button>
      </div>
    </div>
  </div>

  <button id="styleToggle" title="Toggle map style">🛰️</button>

  <script>
    let map;
    let liveWatchId = null;
    let liveMarker = null;
    let liveCoords = [];
    let lastAcceptedCoord = null;

    let startPlace = null;
    let destPlace = null;
    let startMarker = null;
    let destMarker = null;
    let currentRoute = null;
    let currentSteps = [];

    const TRACK_STORAGE_KEY = "towntrip_live_track_v5";
    const DEFAULT_CENTER = [-73.9035, 40.8817];
    const STYLE_STANDARD = "mapbox://styles/mapbox/standard";
    const STYLE_SATELLITE = "mapbox://styles/mapbox/standard-satellite";
    let currentStyle = STYLE_STANDARD;

    function fmt(n, digits = 2) {
      return Number.isFinite(n) ? n.toFixed(digits) : "—";
    }

    function haversineMeters(lng1, lat1, lng2, lat2) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                Math.sin(dLng / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }

    function offsetLngLat([lng, lat], eastMeters, northMeters) {
      const dLat = northMeters / 111320;
      const dLng = eastMeters / (111320 * Math.cos(lat * Math.PI / 180));
      return [lng + dLng, lat + dLat];
    }

    function bearingFromVector(eastSlope, northSlope) {
      if (!Number.isFinite(eastSlope) || !Number.isFinite(northSlope)) return "—";
      const angle = Math.atan2(eastSlope, northSlope) * 180 / Math.PI;
      const normalized = (angle + 360) % 360;
      const dirs = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
      const idx = Math.round(normalized / 45) % 8;
      return dirs[idx];
    }

    function makeLiveMarker() {
      const el = document.createElement("div");
      el.className = "live-marker";
      return el;
    }

    function makePinMarker(kind) {
      const el = document.createElement("div");
      el.className = `pin-marker ${kind === "start" ? "start-marker" : "dest-marker"}`;
      return el;
    }

    async function getElevation(coord) {
      const elev = map.queryTerrainElevation(coord, { exaggerated: false });
      return elev == null ? null : elev;
    }

    async function getPointgrade(coord) {
      const sample = 20;
      const west  = offsetLngLat(coord, -sample, 0);
      const east  = offsetLngLat(coord,  sample, 0);
      const south = offsetLngLat(coord, 0, -sample);
      const north = offsetLngLat(coord, 0,  sample);

      const [eW, eE, eS, eN, eC] = await Promise.all([
        getElevation(west),
        getElevation(east),
        getElevation(south),
        getElevation(north),
        getElevation(coord)
      ]);

      if ([eW, eE, eS, eN, eC].some(v => v == null)) {
        return { elevation: eC, slopePct: null, uphillDir: "—" };
      }

      const eastSlope  = (eE - eW) / (2 * sample);
      const northSlope = (eN - eS) / (2 * sample);
      const slope = Math.sqrt(eastSlope ** 2 + northSlope ** 2);

      return {
        elevation: eC,
        slopePct: slope * 100,
        uphillDir: bearingFromVector(eastSlope, northSlope)
      };
    }

    async function computePathgradeFromRoute(routeCoords) {
      if (!routeCoords || routeCoords.length < 2) return null;

      let totalDist = 0;
      let totalGain = 0;
      let totalLoss = 0;
      let burden = 0;

      let prevCoord = routeCoords[0];
      let prevElev = await getElevation(prevCoord);
      if (prevElev == null) return null;

      for (let i = 1; i < routeCoords.length; i++) {
        const coord = routeCoords[i];
        const elev = await getElevation(coord);
        if (elev == null) continue;

        const segDist = haversineMeters(prevCoord[0], prevCoord[1], coord[0], coord[1]);
        const delta = elev - prevElev;
        const grade = segDist > 0 ? delta / segDist : 0;

        totalDist += segDist;
        if (delta > 0) totalGain += delta;
        if (delta < 0) totalLoss += Math.abs(delta);

        const uphillPenalty = Math.max(0, grade) * 6.0;
        const downhillPenalty = Math.max(0, -grade) * 2.0;
        const multiplier = 1 + uphillPenalty + downhillPenalty;

        burden += segDist * multiplier;

        prevCoord = coord;
        prevElev = elev;
      }

      return {
        distanceMeters: totalDist,
        gainMeters: totalGain,
        lossMeters: totalLoss,
        pathgrade: burden
      };
    }

    function loadSavedTrack() {
      try {
        const raw = localStorage.getItem(TRACK_STORAGE_KEY);
        liveCoords = raw ? JSON.parse(raw) : [];
      } catch {
        liveCoords = [];
      }
    }

    function saveTrack() {
      try {
        localStorage.setItem(TRACK_STORAGE_KEY, JSON.stringify(liveCoords));
      } catch (e) {
        console.warn("Could not save local track", e);
      }
    }

    function updateLiveTrackLayer() {
      if (!map.getSource("live-track")) return;
      map.getSource("live-track").setData({
        type: "Feature",
        geometry: {
          type: "LineString",
          coordinates: liveCoords
        }
      });
    }

    function clearSavedTrack() {
      liveCoords = [];
      lastAcceptedCoord = null;
      localStorage.removeItem(TRACK_STORAGE_KEY);
      updateLiveTrackLayer();
      document.getElementById("liveCoords").textContent = "No live GPS point yet.";
    }

    async function updateLiveInfo(coord, accuracy) {
      const pg = await getPointgrade(coord);
      document.getElementById("liveCoords").innerHTML = `
Lng ${fmt(coord[0], 5)}, Lat ${fmt(coord[1], 5)}
${pg.uphillDir === "—" ? "" : "\nUphill direction: " + pg.uphillDir}
Pointgrade ${pg.slopePct == null ? "—" : fmt(pg.slopePct, 2) + "%"}
Accuracy ${fmt(accuracy, 1)}m
      `.trim();
    }

    async function geocodeSearch(q) {
      const tkRes = await fetch("/api/mapboxtoken");
      const { token } = await tkRes.json();

      const r = await fetch(
        `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(q)}.json?access_token=${token}&country=US&proximity=-73.9035,40.8817&limit=5`
      );
      const d = await r.json();
      return d.features || [];
    }

    function setupSearch(inputId, resultsId, kind) {
      const input = document.getElementById(inputId);
      const box = document.getElementById(resultsId);
      let timer;

      input.addEventListener("input", () => {
        clearTimeout(timer);
        const q = input.value.trim();
        if (q.length < 3) {
          box.style.display = "none";
          return;
        }

        timer = setTimeout(async () => {
          try {
            const features = await geocodeSearch(q);
            box.innerHTML = "";

            if (!features.length) {
              box.style.display = "none";
              return;
            }

            features.forEach(f => {
              const item = document.createElement("div");
              item.className = "search-item";
              item.textContent = f.place_name;
              item.addEventListener("click", async () => {
                const place = { name: f.place_name, center: f.center };

                if (kind === "start") {
                  startPlace = place;
                  input.value = place.name;
                  setStartMarker(place.center);
                } else {
                  destPlace = place;
                  input.value = place.name;
                  setDestMarker(place.center);
                }

                box.style.display = "none";
                await maybeBuildRoute();
              });
              box.appendChild(item);
            });

            box.style.display = "block";
          } catch {
            box.style.display = "none";
          }
        }, 350);
      });

      input.addEventListener("blur", () => {
        setTimeout(() => { box.style.display = "none"; }, 200);
      });
    }

    function setStartMarker(coord) {
      if (startMarker) startMarker.remove();
      startMarker = new mapboxgl.Marker({ element: makePinMarker("start") })
        .setLngLat(coord)
        .addTo(map);
    }

    function setDestMarker(coord) {
      if (destMarker) destMarker.remove();
      destMarker = new mapboxgl.Marker({ element: makePinMarker("dest") })
        .setLngLat(coord)
        .addTo(map);
    }

    async function fetchWalkingRoute(startCoord, destCoord) {
      const tkRes = await fetch("/api/mapboxtoken");
      const { token } = await tkRes.json();

      const coords = `${startCoord[0]},${startCoord[1]};${destCoord[0]},${destCoord[1]}`;
      const url =
        `https://api.mapbox.com/directions/v5/mapbox/walking/${coords}` +
        `?geometries=geojson&overview=full&steps=true&voice_instructions=true&banner_instructions=true&access_token=${token}`;

      const r = await fetch(url);
      const d = await r.json();
      return d;
    }

    function metersDisplay(m) {
      if (!Number.isFinite(m)) return "—";
      if (m < 1000) return `${Math.round(m)} m`;
      return `${(m / 1000).toFixed(2)} km`;
    }

    function translateInstruction(text, lang) {
      if (!text) return "";

      if (lang === "en") return text;

      const rules = {
        fr: [
          [/Head north/i, "Dirigez-vous vers le nord"],
          [/Head south/i, "Dirigez-vous vers le sud"],
          [/Head east/i, "Dirigez-vous vers l'est"],
          [/Head west/i, "Dirigez-vous vers l'ouest"],
          [/Turn right/i, "Tournez à droite"],
          [/Turn left/i, "Tournez à gauche"],
          [/Slight right/i, "Tournez légèrement à droite"],
          [/Slight left/i, "Tournez légèrement à gauche"],
          [/Continue/i, "Continuez"],
          [/Keep right/i, "Restez à droite"],
          [/Keep left/i, "Restez à gauche"],
          [/Destination will be on the right/i, "La destination sera à droite"],
          [/Destination will be on the left/i, "La destination sera à gauche"],
          [/You have arrived/i, "Vous êtes arrivé"],
          [/Walk/i, "Marchez"]
        ],
        tw: [
          [/Head north/i, "Fa kɔ anafoɔ fam"],
          [/Head south/i, "Fa kɔ anaafoɔ fam"],
          [/Head east/i, "Fa kɔ apuee fam"],
          [/Head west/i, "Fa kɔ atɔe fam"],
          [/Turn right/i, "Dane kɔ nifa so"],
          [/Turn left/i, "Dane kɔ benkum so"],
          [/Continue/i, "Kɔ so"],
          [/Keep right/i, "Kɔ nifa so"],
          [/Keep left/i, "Kɔ benkum so"],
          [/Destination will be on the right/i, "Baabi a worekɔ no bɛyɛ nifa so"],
          [/Destination will be on the left/i, "Baabi a worekɔ no bɛyɛ benkum so"],
          [/You have arrived/i, "Woadu"],
          [/Walk/i, "Nantew"]
        ],
        wo: [
          [/Head north/i, "Demal jëm bëj-gànnaar"],
          [/Head south/i, "Demal jëm bëj-saalum"],
          [/Head east/i, "Demal jëm penku"],
          [/Head west/i, "Demal jëm sowwu"],
          [/Turn right/i, "Wëlbëti ndijoor"],
          [/Turn left/i, "Wëlbëti càmmoñ"],
          [/Continue/i, "Yàggal dem"],
          [/Keep right/i, "Toppal ndijoor"],
          [/Keep left/i, "Toppal càmmoñ"],
          [/Destination will be on the right/i, "Fàww ba nga jëm dina nekk ci ndijoor"],
          [/Destination will be on the left/i, "Fàww ba nga jëm dina nekk ci càmmoñ"],
          [/You have arrived/i, "Ags nga"],
          [/Walk/i, "Doox"]
        ],
        pcm: [
          [/Head north/i, "Face north waka go"],
          [/Head south/i, "Face south waka go"],
          [/Head east/i, "Face east waka go"],
          [/Head west/i, "Face west waka go"],
          [/Turn right/i, "Turn right"],
          [/Turn left/i, "Turn left"],
          [/Slight right/i, "Shift small go right"],
          [/Slight left/i, "Shift small go left"],
          [/Continue/i, "Continue waka"],
          [/Keep right/i, "Stay right"],
          [/Keep left/i, "Stay left"],
          [/Destination will be on the right/i, "Your destination go dey for right"],
          [/Destination will be on the left/i, "Your destination go dey for left"],
          [/You have arrived/i, "You don reach"],
          [/Walk/i, "Waka"]
        ]
      };

      let out = text;
      for (const [re, rep] of (rules[lang] || [])) {
        out = out.replace(re, rep);
      }
      return out;
    }

    function renderSteps(steps) {
      currentSteps = steps || [];
      const lang = document.getElementById("langSelect").value;
      const box = document.getElementById("stepsContainer");
      box.innerHTML = "";

      if (!currentSteps.length) {
        box.textContent = "No directions yet.";
        return;
      }

      currentSteps.forEach((step, idx) => {
        const instruction = translateInstruction(step.maneuver?.instruction || "", lang);
        const dist = metersDisplay(step.distance);

        const el = document.createElement("div");
        el.className = "step";
        el.innerHTML = `
          <div class="step-top">
            <div class="step-num">Step ${idx + 1}</div>
            <div class="step-dist">${dist}</div>
          </div>
          <div class="step-text">${instruction}</div>
        `;
        box.appendChild(el);
      });
    }

    async function maybeBuildRoute() {
      if (!startPlace || !destPlace) return;

      document.getElementById("routeSummary").textContent = "Calculating route…";

      try {
        const data = await fetchWalkingRoute(startPlace.center, destPlace.center);
        const route = data.routes?.[0];

        if (!route) {
          document.getElementById("routeSummary").textContent = "No walking route found.";
          return;
        }

        currentRoute = route;
        const routeCoords = route.geometry.coordinates;

        map.getSource("route-line").setData({
          type: "Feature",
          geometry: {
            type: "LineString",
            coordinates: routeCoords
          }
        });

        const pathData = await computePathgradeFromRoute(routeCoords);

        document.getElementById("distanceVal").textContent = `${fmt(route.distance, 0)}m`;
        document.getElementById("durationVal").textContent = `${fmt(route.duration / 60, 1)}m`;
        document.getElementById("gainVal").textContent = pathData ? `${fmt(pathData.gainMeters, 1)}m` : "—";
        document.getElementById("pathgradeVal").textContent = pathData ? `${fmt(pathData.pathgrade, 0)}` : "—";

        document.getElementById("routeSummary").textContent =
          `${startPlace.name} → ${destPlace.name}`;

        const steps = route.legs?.[0]?.steps || [];
        renderSteps(steps);

        const bounds = new mapboxgl.LngLatBounds();
        routeCoords.forEach(c => bounds.extend(c));
        map.fitBounds(bounds, { padding: 70, duration: 800 });

      } catch (e) {
        document.getElementById("routeSummary").textContent = "Could not calculate route.";
      }
    }

    function weatherIconFromCode(code) {
      if (code === 0) return "☀️";
      if ([1, 2].includes(code)) return "🌤️";
      if (code === 3) return "☁️";
      if ([45, 48].includes(code)) return "🌫️";
      if ([51, 53, 55, 56, 57].includes(code)) return "🌦️";
      if ([61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return "🌧️";
      if ([71, 73, 75, 77, 85, 86].includes(code)) return "❄️";
      if ([95, 96, 99].includes(code)) return "⛈️";
      return "☁️";
    }

    function startLiveLocation() {
      if (!navigator.geolocation) {
        document.getElementById("liveStatus").innerHTML =
          `<span class="bad">This device does not support geolocation.</span>`;
        return;
      }

      if (liveWatchId !== null) return;

      document.getElementById("liveStatus").innerHTML =
        `<span class="good">Starting live tracking…</span>`;

      liveWatchId = navigator.geolocation.watchPosition(
        async (pos) => {
          const lng = pos.coords.longitude;
          const lat = pos.coords.latitude;
          const accuracy = pos.coords.accuracy;
          const coord = [lng, lat];

          if (!liveMarker) {
            liveMarker = new mapboxgl.Marker({ element: makeLiveMarker(), anchor: "center" })
              .setLngLat(coord)
              .addTo(map);

            map.flyTo({
              center: coord,
              zoom: 16,
              pitch: 60,
              duration: 700
            });
          } else {
            liveMarker.setLngLat(coord);
          }

          let acceptPoint = true;
          if (lastAcceptedCoord) {
            const d = haversineMeters(
              lastAcceptedCoord[0], lastAcceptedCoord[1],
              coord[0], coord[1]
            );
            if (d < 3) acceptPoint = false;
          }

          if (acceptPoint) {
            liveCoords.push(coord);
            if (liveCoords.length > 5000) {
              liveCoords = liveCoords.slice(-5000);
            }
            lastAcceptedCoord = coord;
            saveTrack();
            updateLiveTrackLayer();
          }

          document.getElementById("liveStatus").innerHTML =
            `<span class="good">Live tracking on.</span> GPS accuracy ${fmt(accuracy, 1)}m.`;

          await updateLiveInfo(coord, accuracy);
        },
        (err) => {
          document.getElementById("liveStatus").innerHTML =
            `<span class="bad">Location error:</span> ${err.message}`;
        },
        {
          enableHighAccuracy: true,
          maximumAge: 2000,
          timeout: 10000
        }
      );
    }

    async function loadWeather() {
      if (!navigator.geolocation) return;

      navigator.geolocation.getCurrentPosition(async (pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        try {
          const r = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weather_code&temperature_unit=fahrenheit`
          );
          const data = await r.json();
          const temp = data?.current?.temperature_2m;
          const code = data?.current?.weather_code;
          document.getElementById("weatherTemp").textContent =
            Number.isFinite(temp) ? `${Math.round(temp)}°` : "--°";
          document.getElementById("weatherIcon").textContent = weatherIconFromCode(code);
        } catch {
          document.getElementById("weatherTemp").textContent = "--°";
          document.getElementById("weatherIcon").textContent = "☁️";
        }
      });
    }

    function setupCardToggle() {
      const card = document.getElementById("bottomCard");
      const btn = document.getElementById("cardToggle");

      function sync() {
        btn.textContent = card.classList.contains("collapsed") ? "Show" : "Hide";
      }

      btn.addEventListener("click", () => {
        card.classList.toggle("collapsed");
        sync();
      });

      sync();
    }

    function ensureCustomLayers() {
      if (!map.getSource("mapbox-dem")) {
        map.addSource("mapbox-dem", {
          type: "raster-dem",
          url: "mapbox://mapbox.mapbox-terrain-dem-v1",
          tileSize: 512,
          maxzoom: 14
        });
      }

      map.setTerrain({
        source: "mapbox-dem",
        exaggeration: 1.15
      });

      if (!map.getSource("live-track")) {
        map.addSource("live-track", {
          type: "geojson",
          data: {
            type: "Feature",
            geometry: { type: "LineString", coordinates: liveCoords }
          }
        });
      }

      if (!map.getLayer("live-track-layer")) {
        map.addLayer({
          id: "live-track-layer",
          type: "line",
          source: "live-track",
          layout: {
            "line-cap": "round",
            "line-join": "round"
          },
          paint: {
            "line-color": "#111827",
            "line-width": 4,
            "line-opacity": 0.82
          }
        });
      }

      if (!map.getSource("route-line")) {
        map.addSource("route-line", {
          type: "geojson",
          data: {
            type: "Feature",
            geometry: { type: "LineString", coordinates: [] }
          }
        });
      }

      if (!map.getLayer("route-line-layer")) {
        map.addLayer({
          id: "route-line-layer",
          type: "line",
          source: "route-line",
          layout: {
            "line-cap": "round",
            "line-join": "round"
          },
          paint: {
            "line-color": "#2563eb",
            "line-width": 5,
            "line-opacity": 0.92
          }
        });
      }

      updateLiveTrackLayer();

      if (currentRoute?.geometry?.coordinates?.length) {
        map.getSource("route-line").setData({
          type: "Feature",
          geometry: {
            type: "LineString",
            coordinates: currentRoute.geometry.coordinates
          }
        });
      }

      if (liveMarker) {
        const lngLat = liveMarker.getLngLat();
        liveMarker.remove();
        liveMarker = new mapboxgl.Marker({ element: makeLiveMarker(), anchor: "center" })
          .setLngLat([lngLat.lng, lngLat.lat])
          .addTo(map);
      }

      if (startPlace) setStartMarker(startPlace.center);
      if (destPlace) setDestMarker(destPlace.center);
    }

    function setupSearch(inputId, resultsId, kind) {
      const input = document.getElementById(inputId);
      const box = document.getElementById(resultsId);
      let timer;

      input.addEventListener("input", () => {
        clearTimeout(timer);
        const q = input.value.trim();
        if (q.length < 3) {
          box.style.display = "none";
          return;
        }

        timer = setTimeout(async () => {
          try {
            const features = await geocodeSearch(q);
            box.innerHTML = "";

            if (!features.length) {
              box.style.display = "none";
              return;
            }

            features.forEach(f => {
              const item = document.createElement("div");
              item.className = "search-item";
              item.textContent = f.place_name;
              item.addEventListener("click", async () => {
                const place = { name: f.place_name, center: f.center };

                if (kind === "start") {
                  startPlace = place;
                  input.value = place.name;
                  setStartMarker(place.center);
                } else {
                  destPlace = place;
                  input.value = place.name;
                  setDestMarker(place.center);
                }

                box.style.display = "none";
                await maybeBuildRoute();
              });
              box.appendChild(item);
            });

            box.style.display = "block";
          } catch {
            box.style.display = "none";
          }
        }, 350);
      });

      input.addEventListener("blur", () => {
        setTimeout(() => { box.style.display = "none"; }, 200);
      });
    }

    async function geocodeSearch(q) {
      const tkRes = await fetch("/api/mapboxtoken");
      const { token } = await tkRes.json();

      const r = await fetch(
        `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(q)}.json?access_token=${token}&country=US&proximity=-73.9035,40.8817&limit=5`
      );
      const d = await r.json();
      return d.features || [];
    }

    function setStartMarker(coord) {
      if (startMarker) startMarker.remove();
      startMarker = new mapboxgl.Marker({ element: makePinMarker("start") })
        .setLngLat(coord)
        .addTo(map);
    }

    function setDestMarker(coord) {
      if (destMarker) destMarker.remove();
      destMarker = new mapboxgl.Marker({ element: makePinMarker("dest") })
        .setLngLat(coord)
        .addTo(map);
    }

    function loadSavedTrack() {
      try {
        const raw = localStorage.getItem(TRACK_STORAGE_KEY);
        liveCoords = raw ? JSON.parse(raw) : [];
      } catch {
        liveCoords = [];
      }
    }

    function saveTrack() {
      try {
        localStorage.setItem(TRACK_STORAGE_KEY, JSON.stringify(liveCoords));
      } catch (e) {
        console.warn("Could not save local track", e);
      }
    }

    async function initMap() {
      const r = await fetch("/api/mapboxtoken");
      const { token } = await r.json();
      mapboxgl.accessToken = token;

      map = new mapboxgl.Map({
        container: "map",
        style: currentStyle,
        center: DEFAULT_CENTER,
        zoom: 13.8,
        pitch: 55,
        bearing: -12,
        attributionControl: true
      });

      map.addControl(new mapboxgl.NavigationControl(), "top-right");

      map.on("style.load", () => {
        ensureCustomLayers();
      });

      loadSavedTrack();
      setupSearch("startInput", "startResults", "start");
      setupSearch("destInput", "destResults", "dest");
      setupCardToggle();
      startLiveLocation();
      loadWeather();

      document.getElementById("useMyLocationBtn").addEventListener("click", async () => {
        if (!liveMarker) return;
        const lngLat = liveMarker.getLngLat();
        startPlace = {
          name: "My Location",
          center: [lngLat.lng, lngLat.lat]
        };
        document.getElementById("startInput").value = "My Location";
        setStartMarker(startPlace.center);
        await maybeBuildRoute();
      });

      document.getElementById("swapBtn").addEventListener("click", async () => {
        const temp = startPlace;
        startPlace = destPlace;
        destPlace = temp;

        document.getElementById("startInput").value = startPlace?.name || "";
        document.getElementById("destInput").value = destPlace?.name || "";

        if (startPlace) setStartMarker(startPlace.center);
        if (destPlace) setDestMarker(destPlace.center);

        await maybeBuildRoute();
      });

      document.getElementById("centerBtn").addEventListener("click", () => {
        if (liveMarker) {
          const lngLat = liveMarker.getLngLat();
          map.flyTo({
            center: [lngLat.lng, lngLat.lat],
            zoom: Math.max(map.getZoom(), 16),
            pitch: 60,
            duration: 700
          });
        }
      });

      document.getElementById("clearTrackBtn").addEventListener("click", clearSavedTrack);

      document.getElementById("langSelect").addEventListener("change", () => {
        renderSteps(currentSteps);
      });

      document.getElementById("styleToggle").addEventListener("click", () => {
        currentStyle = currentStyle === STYLE_STANDARD ? STYLE_SATELLITE : STYLE_STANDARD;
        document.getElementById("styleToggle").textContent =
          currentStyle === STYLE_STANDARD ? "🛰️" : "🗺️";
        map.setStyle(currentStyle);
      });
    }

    initMap();
  </script>
