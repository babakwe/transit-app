<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TownTrip">
<meta name="theme-color" content="#ffffff">
<title>TownTrip</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; font-family:'Outfit',sans-serif; }

#map { position:fixed; inset:0; z-index:0; }

/* ── TOP BAR ── */
.topbar {
  position:fixed; top:0; left:0; right:0; z-index:100;
  padding: max(env(safe-area-inset-top),12px) 16px 12px;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(0,0,0,0.06);
  box-shadow:0 2px 20px rgba(0,0,0,0.07);
}
.topbar-inner { max-width:480px; margin:0 auto; }
.brand-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.brand { font-size:21px; font-weight:900; color:#111; letter-spacing:-0.4px; }
.brand span { color:#0039A6; }
.clock { font-family:'DM Mono',monospace; font-size:11px; color:#aaa; }

.search-box { display:flex; flex-direction:column; gap:6px; }
.srow { display:flex; align-items:center; gap:8px; }
.sdot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.sdot-from { background:#00A651; box-shadow:0 0 6px rgba(0,166,81,0.5); }
.sdot-to   { background:#0039A6; box-shadow:0 0 6px rgba(0,57,166,0.4); }
.sinput {
  flex:1; background:#f2f2f7; border:1.5px solid transparent;
  border-radius:12px; padding:10px 13px;
  font-family:'Outfit',sans-serif; font-size:14px; font-weight:500; color:#111;
  outline:none; transition:all 0.2s;
}
.sinput::placeholder { color:#bbb; font-weight:400; }
.sinput:focus { border-color:#0039A6; background:#fff; box-shadow:0 0 0 3px rgba(0,57,166,0.07); }
.sibtn {
  width:40px; height:40px; border-radius:10px; flex-shrink:0;
  background:#fff; border:1.5px solid #e8e8ec;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:17px; transition:all 0.15s;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}
.sibtn:active { transform:scale(0.88); }
.gobtn {
  width:100%; margin-top:6px; background:#0039A6; border:none;
  border-radius:12px; padding:12px;
  font-family:'Outfit',sans-serif; font-size:14px; font-weight:700; color:white;
  cursor:pointer; box-shadow:0 4px 16px rgba(0,57,166,0.3); transition:opacity 0.2s;
}
.gobtn:active { opacity:0.8; }
.gobtn:disabled { opacity:0.38; cursor:not-allowed; }

/* ── FAB ── */
.fab {
  position:fixed; right:16px; z-index:100;
  width:46px; height:46px; border-radius:14px;
  background:white; border:1.5px solid #e8e8ec;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:20px;
  box-shadow:0 2px 14px rgba(0,0,0,0.1);
  transition:transform 0.15s;
}
.fab:active { transform:scale(0.88); }
#fab-locate { bottom: calc(env(safe-area-inset-bottom, 0px) + 24px); }

/* ── BOTTOM SHEET ── */
.sheet {
  position:fixed; left:0; right:0; bottom:0; z-index:200;
  background:white; border-radius:24px 24px 0 0;
  box-shadow:0 -6px 40px rgba(0,0,0,0.13);
  transform:translateY(110%);
  transition:transform 0.38s cubic-bezier(0.32,1.1,0.64,1);
  max-height:75vh; overflow-y:auto;
  padding-bottom:max(env(safe-area-inset-bottom),24px);
}
.sheet.open { transform:translateY(0); }
.sheet-handle { width:36px; height:4px; background:#e2e2e8; border-radius:2px; margin:14px auto 0; }
.sheet-inner { padding:16px 20px 28px; }
.sheet-close {
  position:absolute; top:14px; right:16px; width:30px; height:30px;
  border-radius:50%; background:#f2f2f7; border:none; cursor:pointer;
  font-size:14px; color:#888; display:flex; align-items:center; justify-content:center;
}

/* stop popup */
.stop-name { font-size:18px; font-weight:800; color:#111; margin-bottom:5px; }
.stop-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
.tag { font-size:10px; font-weight:700; padding:4px 10px; border-radius:8px; background:#f2f2f7; color:#666; }
.tag-elev { background:#eef2ff; color:#3355cc; }
.tag-walk { background:#efffef; color:#227733; }

.arr-title { font-size:9px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:#ccc; margin-bottom:10px; }
.arr-row {
  display:flex; align-items:center; gap:12px;
  padding:12px 14px; border-radius:14px; margin-bottom:8px;
  background:#f8f8fa; border:1.5px solid transparent; transition:border-color 0.2s;
}
.arr-row.urg-now  { border-color:#FF6319; background:#fff8f4; }
.arr-row.urg-soon { border-color:#FFA500; background:#fffbf0; }
.arr-row.urg-go   { border-color:#00A651; background:#f4fff8; }

/* bus icon — real bus colors + shape */
.bus-icon {
  display:flex; align-items:center; justify-content:center;
  color:white; font-weight:900; font-size:11px; letter-spacing:0.02em;
  border-radius:8px; padding:7px 10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.18); flex-shrink:0; position:relative;
  min-width:44px;
}
.bus-sbs { border-radius:7px; padding:7px 16px; font-size:10px; }
/* articulation joint for SBS */
.bus-sbs::after {
  content:''; position:absolute; right:28%; top:20%; bottom:20%;
  width:2px; background:rgba(255,255,255,0.3); border-radius:1px;
}
.arr-info { flex:1; min-width:0; }
.arr-line { font-size:12px; font-weight:700; color:#333; }
.arr-seq  { font-size:10px; color:#bbb; margin-top:1px; }
.arr-mins {
  font-family:'DM Mono',monospace; font-size:30px; font-weight:400;
  line-height:1; flex-shrink:0; text-align:right;
}
.arr-mins small { font-size:11px; color:#aaa; font-weight:600; }
.col-now  { color:#FF6319; }
.col-soon { color:#FFA500; }
.col-go   { color:#00A651; }

/* ── WORM SHEET ── */
.worm-sheet {
  position:fixed; left:0; right:0; bottom:0; z-index:201;
  background:white; border-radius:24px 24px 0 0;
  box-shadow:0 -6px 40px rgba(0,0,0,0.15);
  transform:translateY(110%);
  transition:transform 0.42s cubic-bezier(0.32,1.1,0.64,1);
  padding-bottom:max(env(safe-area-inset-bottom),24px);
}
.worm-sheet.open { transform:translateY(0); }
.ws-handle { width:36px; height:4px; background:#e2e2e8; border-radius:2px; margin:14px auto 0; }
.ws-close {
  position:absolute; top:14px; right:16px; width:30px; height:30px;
  border-radius:50%; background:#f2f2f7; border:none; cursor:pointer; font-size:14px; color:#888;
}
.ws-inner { padding:14px 20px 24px; }

.urg-hero { text-align:center; padding:10px 0 14px; border-bottom:1px solid #f0f0f5; margin-bottom:14px; }
.urg-action { font-size:28px; font-weight:900; line-height:1; margin-bottom:4px; }
.urg-go   { color:#00A651; }
.urg-soon { color:#FFA500; }
.urg-now  { color:#FF6319; animation:upulse 1s ease-in-out infinite; }
.urg-gone { color:#ccc; }
@keyframes upulse { 0%,100%{opacity:1}50%{opacity:0.35} }
.urg-sub { font-size:12px; color:#999; }

.worm-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; padding:4px 0 10px; }
.worm-scroll::-webkit-scrollbar { display:none; }

.stop-chips { display:flex; gap:8px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; padding:6px 0 2px; }
.stop-chips::-webkit-scrollbar { display:none; }
.schip {
  flex-shrink:0; min-width:82px; background:#f4f4f8; border-radius:14px;
  padding:10px 12px; cursor:pointer; border:2px solid transparent;
  text-align:center; transition:all 0.2s;
}
.schip.active { border-color:#0039A6; background:#eef2ff; }
.schip:active { transform:scale(0.92); }
.schip-route { font-size:10px; font-weight:800; display:block; }
.schip-stop  { font-size:8px; color:#aaa; display:block; margin-top:1px; line-height:1.3; max-width:78px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.schip-mins  { font-size:22px; font-weight:900; font-family:'DM Mono',monospace; display:block; margin-top:3px; }
.schip-lbl   { font-size:7px; color:#bbb; font-weight:600; letter-spacing:0.06em; }

/* loading */
.ldots { display:flex; gap:6px; justify-content:center; padding:20px; }
.ld { width:8px; height:8px; border-radius:50%; background:#ddd; animation:ldot 1.2s ease-in-out infinite; }
.ld:nth-child(2){animation-delay:0.2s} .ld:nth-child(3){animation-delay:0.4s}
@keyframes ldot{0%,80%,100%{transform:scale(0.4);opacity:0.2}40%{transform:scale(1);opacity:1}}

/* pin hint */
.pin-hint {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.72); color:white; padding:12px 22px;
  border-radius:16px; font-size:13px; font-weight:600; z-index:300;
  pointer-events:none; opacity:0; transition:opacity 0.2s;
}
.pin-hint.show { opacity:1; }

/* ── ROUTE OPTIONS SHEET ── */
.options-sheet {
  position:fixed; left:0; right:0; bottom:0; z-index:202;
  background:white; border-radius:24px 24px 0 0;
  box-shadow:0 -6px 40px rgba(0,0,0,0.15);
  transform:translateY(110%);
  transition:transform 0.42s cubic-bezier(0.32,1.1,0.64,1);
  max-height:80vh; overflow-y:auto;
  padding-bottom:max(env(safe-area-inset-bottom),24px);
}
.options-sheet.open { transform:translateY(0); }
.os-handle { width:36px; height:4px; background:#e2e2e8; border-radius:2px; margin:14px auto 0; }
.os-close {
  position:absolute; top:14px; right:16px; width:30px; height:30px;
  border-radius:50%; background:#f2f2f7; border:none; cursor:pointer; font-size:14px; color:#888;
}
.os-inner { padding:14px 20px 24px; }
.os-title { font-size:13px; font-weight:700; color:#999; margin-bottom:14px; text-transform:uppercase; letter-spacing:0.08em; }

/* option card */
.opt-card {
  display:flex; align-items:center; gap:14px;
  padding:14px 16px; border-radius:16px; margin-bottom:10px;
  border:2px solid #eee; background:#fafafa; cursor:pointer;
  transition:all 0.18s;
}
.opt-card:active { transform:scale(0.97); }
.opt-card.best { border-color:#0039A6; background:#f0f4ff; }
.opt-card.alt  { border-color:#e8e8ec; }
.opt-bus {
  width:52px; height:52px; border-radius:12px; flex-shrink:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:white; position:relative;
}
.opt-bus-name { font-size:12px; font-weight:900; line-height:1; }
.opt-bus-type { font-size:8px; font-weight:700; opacity:0.8; margin-top:2px; }
/* SBS articulation mark */
.opt-bus.sbs::after {
  content:''; position:absolute; right:10px; top:20%; bottom:20%;
  width:2px; background:rgba(255,255,255,0.35); border-radius:1px;
}
.opt-info { flex:1; min-width:0; }
.opt-label { font-size:15px; font-weight:800; color:#111; margin-bottom:3px; }
.opt-detail { font-size:11px; color:#aaa; line-height:1.5; }
.opt-right { text-align:right; flex-shrink:0; }
.opt-mins { font-family:'DM Mono',monospace; font-size:28px; font-weight:400; line-height:1; }
.opt-mins-lbl { font-size:9px; color:#bbb; font-weight:600; letter-spacing:0.06em; margin-top:2px; }
.opt-badge {
  display:inline-block; font-size:9px; font-weight:700; padding:3px 8px;
  border-radius:6px; margin-bottom:6px;
}
.badge-best { background:#0039A6; color:white; }
.badge-alt  { background:#f0f0f5; color:#999; }
.badge-walk { background:#efffef; color:#227733; }

/* mapbox overrides */
.mapboxgl-ctrl-logo { display:none !important; }
.mapboxgl-ctrl-attrib { display:none !important; }
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand-row">
      <div class="brand">Town<span>Trip</span></div>
      <div class="clock" id="clk"></div>
    </div>
    <div class="search-box">
      <div class="srow">
        <div class="sdot sdot-from"></div>
        <input class="sinput" id="from-input" placeholder="Where are you?" autocomplete="off">
        <div class="sibtn" id="gps-btn" onclick="getGPS()" title="My location">📍</div>
        <div class="sibtn" onclick="triggerCamera()" title="Photo landmark">📷</div>
      </div>
      <div class="srow">
        <div class="sdot sdot-to"></div>
        <input class="sinput" id="to-input" placeholder="Tap map, type, or 📷 destination" autocomplete="off">
        <div class="sibtn" onclick="enablePinDrop()" title="Pin on map">📌</div>
      </div>
      <button class="gobtn" id="go-btn" onclick="findRoute()">Find my ride →</button>
    </div>
  </div>
</div>

<div class="fab" id="fab-locate" onclick="centerOnMe()">🎯</div>

<!-- STOP SHEET -->
<div class="sheet" id="stop-sheet">
  <div class="sheet-handle"></div>
  <button class="sheet-close" onclick="closeSheet()">✕</button>
  <div class="sheet-inner" id="sheet-content">
    <div class="ldots"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
  </div>
</div>

<!-- WORM SHEET -->
<div class="worm-sheet" id="worm-sheet">
  <div class="ws-handle"></div>
  <button class="ws-close" onclick="closeWorm()">✕</button>
  <div class="ws-inner">
    <div class="urg-hero" id="urg-hero"></div>
    <div class="worm-scroll" id="worm-svg-wrap"></div>
    <div class="stop-chips" id="stop-chips"></div>
  </div>
</div>

<!-- ROUTE OPTIONS SHEET -->
<div class="options-sheet" id="options-sheet">
  <div class="os-handle"></div>
  <button class="os-close" onclick="closeOptions()">✕</button>
  <div class="os-inner">
    <div class="os-title">Choose your bus</div>
    <div id="options-list"></div>
  </div>
</div>

<div class="pin-hint" id="pin-hint">Tap anywhere on the map to set destination</div>
<input type="file" id="cam-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">

<script>
// ── CLOCK ──
function tick(){const n=new Date();document.getElementById('clk').textContent=n.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});}
setInterval(tick,1000);tick();

// ── BUS COLORS (real MTA livery) ──
const BUS_COLOR = {
  'BX12+': {bg:'#0039A6', text:'BX12 SBS', type:'sbs'},
  'BX12':  {bg:'#0039A6', text:'BX12',     type:'local'},
  'BX26':  {bg:'#6BBE45', text:'BX26',     type:'local'},
  'BX28':  {bg:'#FF6319', text:'BX28',     type:'local'},
  'BX23':  {bg:'#8C4799', text:'BX23',     type:'local'},
  'BX5':   {bg:'#00B2A9', text:'BX5',      type:'local'},
  'BX38':  {bg:'#E4002B', text:'BX38',     type:'local'},
  'M15+':  {bg:'#EE352E', text:'M15 SBS',  type:'sbs'},
  'M86+':  {bg:'#EE352E', text:'M86 SBS',  type:'sbs'},
  'B44+':  {bg:'#00933C', text:'B44 SBS',  type:'sbs'},
};

// ── CORRIDOR DATA ──
// Each option = a specific bus + its departure stop
const CORRIDORS = [{
  fromKeys:['alcott','co-op','coop','dreiser','carver','bellamy','baychester','einstein','140'],
  toKeys:['tiebout','fordham','2390','jerome'],
  label:'Co-op City → Fordham / Tiebout',
  // All bus options for this trip — user picks one
  options:[
    {
      id:'bx12sbs',
      busName:'BX12+',
      busLabel:'BX12 SBS',
      busColor:'#0039A6',
      busType:'sbs',
      boardStop:{id:'bartow', name:'Bartow Ave / Co-op City Blvd', lat:40.8735, lng:-73.8380, walkFromHome:12, elevation:22, stopId:'200760'},
      alightStop:'Fordham Rd / Tiebout Ave',
      rideTime:22,
      walkFromStop:4,
      detail:'Direct · No transfers · Every 6-8 min',
      primary:true,
    },
    {
      id:'bx26',
      busName:'BX26',
      busLabel:'BX26',
      busColor:'#6BBE45',
      busType:'local',
      boardStop:{id:'bartow2', name:'Bartow Ave / Co-op City Blvd', lat:40.8735, lng:-73.8380, walkFromHome:12, elevation:22, stopId:'200758'},
      alightStop:'Fordham Rd area',
      rideTime:28,
      walkFromStop:6,
      detail:'Alt if BX12 SBS is packed · Every 10 min',
      primary:false,
    },
    {
      id:'bx28',
      busName:'BX28',
      busLabel:'BX28',
      busColor:'#FF6319',
      busType:'local',
      boardStop:{id:'alcott', name:'Alcott Pl / Asch Loop', lat:40.8745, lng:-73.8308, walkFromHome:5, elevation:18, stopId:'200759'},
      alightStop:'Fordham Rd area',
      rideTime:32,
      walkFromStop:7,
      detail:'Closest stop — 5 min walk · Slower ride',
      primary:false,
    },
  ],
  // All stops along the main route (for worm drawing)
  routeStops:[
    {lat:40.8735, lng:-73.8380},
    {lat:40.8560, lng:-73.8680},
    {lat:40.8540, lng:-73.8780},
    {lat:40.8631, lng:-73.9020},
  ]
}];

// ── STATE ──
let map, userLng=null, userLat=null, activeCorridor=null;
let arrivals={}, pinDropMode=false, wormLayerAdded=false;
let refreshTimer=null;

// ── INIT MAP ──
async function initMap(){
  // Fetch Mapbox token from our secure backend
  let token;
  try{
    const r=await fetch('/api/mapboxtoken');
    const d=await r.json();
    token=d.token;
  }catch(e){console.error('Token fetch failed',e);return;}

  if(!token){console.error('No Mapbox token');return;}
  mapboxgl.accessToken=token;

  map=new mapboxgl.Map({
    container:'map',
    // Clean white style — closest to MTA map look
    style:'mapbox://styles/mapbox/light-v11',
    center:[-74.0060, 40.7128], // NYC
    zoom:10,
    minZoom:9,
    maxZoom:18,
  });

  map.on('load',()=>{
    // Draw all corridor stops as interactive layers
    CORRIDORS.forEach(c=>addCorridorLayer(c));
    // Try to get user location
    locateUser();
  });

  // Click on map for pin drop
  map.on('click', e=>{
    if(pinDropMode){
      dropPin(e.lngLat.lng, e.lngLat.lat);
    }
  });

  // Stop clicks handled via layer events (added in addCorridorLayer)
  map.on('mouseenter','stops-layer',()=>map.getCanvas().style.cursor='pointer');
  map.on('mouseleave','stops-layer',()=>map.getCanvas().style.cursor='');
}

// ── ADD STOPS TO MAP ── 
function addCorridorLayer(corridor){
  // Build GeoJSON from all unique board stops
  const seen=new Set();
  const features=[];
  corridor.options.forEach((opt,oi)=>{
    const s=opt.boardStop;
    if(seen.has(s.id)) return;
    seen.add(s.id);
    const rc=BUS_COLOR[opt.busName]||{bg:'#888',text:opt.busName};
    features.push({
      type:'Feature',
      geometry:{type:'Point',coordinates:[s.lng,s.lat]},
      properties:{
        id:s.id, name:s.name,
        route:opt.busName, color:rc.bg,
        elevation:s.elevation||0,
        walkFromHome:s.walkFromHome||0,
        optIdx:oi,
      }
    });
  });

  if(map.getSource('stops-source')){
    map.getSource('stops-source').setData({type:'FeatureCollection',features});
    return;
  }

  map.addSource('stops-source',{type:'geojson',data:{type:'FeatureCollection',features}});
  map.addLayer({id:'stops-glow',type:'circle',source:'stops-source',
    paint:{'circle-radius':['interpolate',['linear'],['zoom'],10,12,15,22],'circle-color':['get','color'],'circle-opacity':0.14,'circle-blur':0.6}});
  map.addLayer({id:'stops-layer',type:'circle',source:'stops-source',
    paint:{'circle-radius':['interpolate',['linear'],['zoom'],10,7,14,14,16,19],
      'circle-color':['get','color'],'circle-stroke-width':2.5,'circle-stroke-color':'white'}});
  map.addLayer({id:'stops-labels',type:'symbol',source:'stops-source',minzoom:12,
    layout:{'text-field':['get','route'],'text-font':['DIN Pro Bold','Arial Unicode MS Bold'],
      'text-size':['interpolate',['linear'],['zoom'],12,8,16,11],
      'text-offset':[0,0],'text-anchor':'center','text-allow-overlap':true},
    paint:{'text-color':'white','text-halo-color':'rgba(0,0,0,0.1)','text-halo-width':0.5}});

  map.on('click','stops-layer',e=>{
    const p=e.features[0].properties;
    const opt=corridor.options[p.optIdx];
    if(opt) openStopSheet(opt.boardStop, opt.busName);
  });
  map.on('mouseenter','stops-layer',()=>map.getCanvas().style.cursor='pointer');
  map.on('mouseleave','stops-layer',()=>map.getCanvas().style.cursor='');
}

// ── USER LOCATION ──
function locateUser(){
  if(!navigator.geolocation)return;
  navigator.geolocation.watchPosition(pos=>{
    userLat=pos.coords.latitude;
    userLng=pos.coords.longitude;
    updateUserDot();
  },{enableHighAccuracy:true,timeout:8000,maximumAge:10000});
}

function updateUserDot(){
  if(!map||userLat==null)return;
  // Use Mapbox's built-in user location or add our own
  if(!map.getSource('user-loc')){
    map.addSource('user-loc',{type:'geojson',data:userGeoJSON()});
    // Pulse ring
    map.addLayer({id:'user-pulse',type:'circle',source:'user-loc',
      paint:{'circle-radius':18,'circle-color':'#0039A6','circle-opacity':0.12}});
    // Core dot
    map.addLayer({id:'user-dot',type:'circle',source:'user-loc',
      paint:{'circle-radius':8,'circle-color':'#0039A6','circle-stroke-width':3,'circle-stroke-color':'white'}});
    // Fly to user
    map.flyTo({center:[userLng,userLat],zoom:13,speed:1.2});
    document.getElementById('gps-btn').textContent='✓';
  } else {
    map.getSource('user-loc').setData(userGeoJSON());
  }
}
function userGeoJSON(){return{type:'Feature',geometry:{type:'Point',coordinates:[userLng,userLat]}};}
function getGPS(){document.getElementById('gps-btn').textContent='⟳';locateUser();}
function centerOnMe(){if(map&&userLat)map.flyTo({center:[userLng,userLat],zoom:14,speed:1.4});}

// ── PIN DROP ──
function enablePinDrop(){
  pinDropMode=true;
  document.getElementById('pin-hint').classList.add('show');
  map.getCanvas().style.cursor='crosshair';
}
function dropPin(lng,lat){
  pinDropMode=false;
  document.getElementById('pin-hint').classList.remove('show');
  map.getCanvas().style.cursor='';
  // Remove existing pin
  if(map.getSource('dest-pin')){map.getSource('dest-pin').setData({type:'Feature',geometry:{type:'Point',coordinates:[lng,lat]}});}
  else{
    map.addSource('dest-pin',{type:'geojson',data:{type:'Feature',geometry:{type:'Point',coordinates:[lng,lat]}}});
    map.addLayer({id:'dest-pin-layer',type:'circle',source:'dest-pin',
      paint:{'circle-radius':10,'circle-color':'#0039A6','circle-stroke-width':3,'circle-stroke-color':'white'}});
  }
  // Reverse geocode
  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`)
    .then(r=>r.json()).then(d=>{
      const a=d.address;
      document.getElementById('to-input').value=(`${a.house_number?a.house_number+' ':''}${a.road||''}${a.suburb?', '+a.suburb:''}`).trim()||`${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    }).catch(()=>{document.getElementById('to-input').value=`${lat.toFixed(4)}, ${lng.toFixed(4)}`;});
}

// ── CAMERA ──
function triggerCamera(){document.getElementById('cam-input').click();}
async function handlePhoto(e){
  const file=e.target.files[0];if(!file)return;
  document.getElementById('to-input').value='📷 Identifying landmark…';
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const res=await fetch('/api/vision',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:ev.target.result.split(',')[1]})});
      const d=await res.json();
      document.getElementById('to-input').value=d.address||d.landmark||'Could not identify — type address';
    }catch{document.getElementById('to-input').value='Could not identify — type address';}
  };
  reader.readAsDataURL(file);e.target.value='';
}

// ── OPEN STOP SHEET ──
async function openStopSheet(stop, busName){
  document.getElementById('stop-sheet').classList.add('open');
  document.getElementById('worm-sheet').classList.remove('open');
  document.getElementById('options-sheet').classList.remove('open');
  document.getElementById('sheet-content').innerHTML=`<div class="ldots"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>`;

  const routes=busName?[busName]:(stop.routes||[]);
  const rows=[];
  for(const route of routes){
    const sid=stop.stopId||(stop.stopId?.[route]);
    const mins=sid?await fetchBus(sid,route):simMins(stop.id||stop.name,route);
    if(mins?.length) mins.slice(0,3).forEach((m,i)=>rows.push({route,mins:m,seq:i}));
  }
  rows.sort((a,b)=>a.mins-b.mins);

  const tags=[
    stop.walkFromHome?`<div class="tag tag-walk">🚶 ${stop.walkFromHome} min walk</div>`:'',
    stop.elevation?`<div class="tag tag-elev">⛰ ${stop.elevation} ft elevation</div>`:'',
  ].join('');

  const arrHtml=rows.length?rows.map(r=>{
    const rc=BUS_COLOR[r.route]||{bg:'#888',text:r.route,type:'local'};
    const urgRow=r.mins<=2?'urg-now':r.mins<=8?'urg-soon':'urg-go';
    const urgCol=r.mins<=2?'col-now':r.mins<=8?'col-soon':'col-go';
    const seq=r.seq===0?'Next bus':r.seq===1?'Then':'After that';
    return`<div class="arr-row ${urgRow}">
      <div class="bus-icon ${rc.type==='sbs'?'bus-sbs':''}" style="background:${rc.bg}">${rc.text}</div>
      <div class="arr-info">
        <div class="arr-line">${r.route} · ${seq}</div>
        <div class="arr-seq">${stop.name}</div>
      </div>
      <div class="arr-mins ${urgCol}">${r.mins}<small>m</small></div>
    </div>`;
  }).join(''):`<div style="color:#ccc;font-size:12px;padding:16px;text-align:center">No arrivals right now</div>`;

  document.getElementById('sheet-content').innerHTML=`
    <div class="stop-name">${stop.name}</div>
    <div class="stop-tags">${tags}</div>
    <div class="arr-title">Live arrivals</div>
    ${arrHtml}`;
}

function closeSheet(){document.getElementById('stop-sheet').classList.remove('open');}
function closeWorm(){
  document.getElementById('worm-sheet').classList.remove('open');
  clearInterval(refreshTimer);
  if(map.getLayer('worm-line'))map.removeLayer('worm-line');
  if(map.getSource('worm-source'))map.removeSource('worm-source');
}

// ── FIND ROUTE → Google gives ALL options, user picks ──
async function findRoute(){
  const fromVal=document.getElementById('from-input').value.trim();
  const toVal=document.getElementById('to-input').value.trim();
  if(!fromVal||!toVal)return;

  document.getElementById('go-btn').disabled=true;
  document.getElementById('go-btn').textContent='Finding…';
  closeSheet();
  document.getElementById('worm-sheet').classList.remove('open');
  document.getElementById('options-sheet').classList.remove('open');

  // Store for worm drawing later
  activeCorridor=CORRIDORS.find(c=>
    c.fromKeys.some(k=>fromVal.toLowerCase().includes(k))&&
    c.toKeys.some(k=>toVal.toLowerCase().includes(k))
  );

  try{
    // Ask Google for ALL transit alternatives
    const res=await fetch(`/api/directions?origin=${encodeURIComponent(fromVal)}&destination=${encodeURIComponent(toVal)}&alternatives=true`);
    const data=await res.json();

    if(data.routes?.length){
      showAllOptions(data.routes, fromVal, toVal);
    } else {
      showError('No transit routes found. Try different addresses.');
    }
  }catch(e){
    showError('Could not connect. Check your internet.');
  }

  document.getElementById('go-btn').disabled=false;
  document.getElementById('go-btn').textContent='Find my ride →';
}

// ── SHOW ALL GOOGLE OPTIONS ──
function showAllOptions(routes, from, to){
  routes.sort((a,b)=>(a.legs?.[0]?.duration?.value||0)-(b.legs?.[0]?.duration?.value||0));

  const cards=routes.map((route,i)=>{
    const leg=route.legs?.[0];
    if(!leg) return '';

    const dur=leg.duration?.text||'—';
    const depTime=leg.departure_time?.text||'Now';
    const arrTime=leg.arrival_time?.text||'—';
    const depVal=leg.departure_time?.value;
    const leaveIn=depVal?Math.round((depVal*1000-Date.now())/60000):null;
    const urgCol=leaveIn==null?'#aaa':leaveIn<=2?'#FF6319':leaveIn<=6?'#FFA500':'#00A651';
    const leaveStr=leaveIn==null?depTime:leaveIn<=0?'Leave NOW':leaveIn<=1?'Leave in 1 min':`Leave in ${leaveIn} min`;
    const isFirst=i===0;

    const allSteps=leg.steps||[];
    const transitSteps=allSteps.filter(s=>s.travel_mode==='TRANSIT');
    const transfers=transitSteps.length>1?`${transitSteps.length-1} transfer${transitSteps.length>2?'s':''}`:'Direct';
    const totalWalk=allSteps.filter(s=>s.travel_mode==='WALKING').reduce((a,s)=>a+(s.duration?.value||0),0);
    const walkMins=Math.round(totalWalk/60);

    // Build worm SVG for this route
    const wormSVG=buildOptionWorm(allSteps, leg.duration?.value||0);

    return`<div class="opt-card ${isFirst?'best':'alt'}" onclick="selectGoogleOption(${i})">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
            ${isFirst?'<span class="opt-badge badge-best">Fastest</span>':''}
            <span class="opt-badge badge-alt">${transfers}</span>
            ${walkMins>0?`<span class="opt-badge badge-walk">🚶 ${walkMins}m walk</span>`:''}
          </div>
          <div style="text-align:right;flex-shrink:0;padding-left:8px">
            <div style="font-size:20px;font-weight:900;color:${urgCol};font-family:'DM Mono',monospace;line-height:1">${dur.replace(' mins','').replace(' min','')}<span style="font-size:10px;color:#bbb;font-weight:400"> min</span></div>
            <div style="font-size:10px;font-weight:700;color:${urgCol};margin-top:2px">${leaveStr}</div>
          </div>
        </div>
        <!-- THE WORM -->
        <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:4px 0 6px;margin:0 -2px">
          ${wormSVG}
        </div>
        <div style="font-size:10px;color:#bbb;margin-top:4px">${depTime} → ${arrTime}</div>
      </div>
    </div>`;
  }).join('');

  window._googleRoutes=routes;
  window._fromVal=from;
  window._toVal=to;

  document.getElementById('options-list').innerHTML=
    `<div style="font-size:10px;color:#aaa;margin-bottom:12px">Tap a route to lock it in</div>`+cards;
  document.getElementById('options-sheet').classList.add('open');
}

// ── BUILD WORM SVG for a route card ──
function buildOptionWorm(steps, totalSecs){
  if(!steps?.length) return '';

  const H=54; const cy=H/2;
  const TOTAL_W=320;
  const PAD=14;
  const availW=TOTAL_W-PAD*2;

  // Build segments from steps
  const segments=steps.map(step=>{
    const secs=step.duration?.value||60;
    const isWalk=step.travel_mode==='WALKING';
    const t=step.transit_details;
    const name=t?.line?.short_name||t?.line?.name||'Bus';
    const color=isWalk?'rgba(0,0,0,0.15)':(t?.line?.color||BUS_COLOR[name]?.bg||'#555');
    const textColor=t?.line?.text_color||'#fff';
    const isSBS=name.includes('+');
    const mins=Math.round(secs/60);
    return{isWalk, name, color, textColor, isSBS, secs, mins};
  });

  const totalSegSecs=segments.reduce((a,s)=>a+s.secs,0)||1;

  // Compute x positions proportionally
  let cx=PAD;
  const pts=[];
  segments.forEach((seg,i)=>{
    const w=Math.max(isNaN(seg.secs)?20:seg.secs/totalSegSecs*availW, seg.isWalk?18:32);
    const x1=cx;
    const x2=cx+w;
    const midX=(x1+x2)/2;
    // Gentle wave: alternate up/down
    const waveY=i%2===0?cy-5:cy+5;
    pts.push({seg, x1, x2, midX, waveY, w});
    cx=x2;
  });
  const svgW=Math.max(TOTAL_W, cx+PAD);

  let svg=`<svg width="${svgW}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;min-width:${svgW}px">
<defs>
  <filter id="og${Math.random().toString(36).slice(2,6)}">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>`;

  const glowId=`og${Math.random().toString(36).slice(2,6)}`;
  svg=`<svg width="${svgW}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;min-width:${svgW}px">
<defs>
  <filter id="${glowId}"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>`;

  pts.forEach((p,i)=>{
    const{seg,x1,x2,midX,waveY,w}=p;
    const prev=pts[i-1];
    const startY=prev?prev.waveY:cy;
    const endY=waveY;

    if(seg.isWalk){
      // Walking: thin dashed squiggle in grey
      const numWiggles=Math.max(2,Math.round(w/12));
      const ww=w/numWiggles;
      let d=`M ${x1} ${startY}`;
      for(let j=0;j<numWiggles;j++){
        const ax=x1+j*ww+ww*0.25;
        const ay=startY+(j%2===0?-6:6);
        const bx=x1+j*ww+ww*0.75;
        const by=startY+(j%2===0?6:-6);
        const ex=x1+(j+1)*ww;
        d+=` C ${ax} ${ay} ${bx} ${by} ${ex} ${endY}`;
      }
      svg+=`<path d="${d}" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="3.5" stroke-linecap="round"/>`;
      // Walk label
      if(seg.mins>0) svg+=`<text x="${midX}" y="${cy-12}" text-anchor="middle" fill="rgba(0,0,0,0.3)" font-family="Outfit,sans-serif" font-size="8" font-weight="600">🚶${seg.mins}m</text>`;
    } else {
      // Bus: thick glowing colored worm
      // Smooth curve from prev end to this segment
      const cp1x=x1+w*0.2; const cp2x=x2-w*0.2;
      const d=`M ${x1} ${startY} C ${cp1x} ${startY} ${cp2x} ${endY} ${x2} ${endY}`;

      // Glow + gradient
      svg+=`<path d="${d}" fill="none" stroke="${seg.color}" stroke-width="13" stroke-linecap="round" opacity="0.9" filter="url(#${glowId})"/>`;
      // Shimmer stripe
      svg+=`<path d="${d}" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="4" stroke-linecap="round" stroke-dasharray="14 28">
        <animate attributeName="stroke-dashoffset" from="42" to="0" dur="1.6s" repeatCount="indefinite"/>
      </path>`;
      // Bus name label on worm body
      svg+=`<text x="${midX}" y="${endY+4}" text-anchor="middle" fill="${seg.textColor}" font-family="Outfit,sans-serif" font-size="${seg.isSBS?9:10}" font-weight="900">${seg.name}</text>`;
      // SBS articulation mark
      if(seg.isSBS) svg+=`<line x1="${midX+10}" y1="${endY-4}" x2="${midX+10}" y2="${endY+4}" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>`;
    }

    // Node dot at segment start (except first — that's the user head)
    if(i>0){
      svg+=`<circle cx="${x1}" cy="${startY}" r="5" fill="${seg.isWalk?'rgba(0,0,0,0.12)':seg.color}" stroke="white" stroke-width="2"/>`;
    }
  });

  // Destination star node at end
  const last=pts[pts.length-1];
  if(last){
    svg+=`<circle cx="${last.x2}" cy="${last.waveY}" r="7" fill="#0039A6" stroke="white" stroke-width="2.5"/>`;
    svg+=`<text x="${last.x2}" y="${last.waveY+4}" text-anchor="middle" fill="white" font-size="8" font-weight="900">★</text>`;
  }

  // User head — animated green dot
  const firstY=pts[0]?pts[0].waveY:cy;
  svg+=`<circle cx="${PAD}" cy="${cy}" r="8" fill="#00A651" stroke="white" stroke-width="2.5" filter="url(#${glowId})">
    <animate attributeName="r" values="7;10;7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="${PAD}" cy="${cy}" r="3.5" fill="white"/>`;

  svg+=`</svg>`;
  return svg;
}

// ── USER PICKS A GOOGLE OPTION ──
function selectGoogleOption(idx){
  const route=window._googleRoutes?.[idx];
  if(!route)return;
  closeOptions();
  renderGoogleWorm(route, idx);
}

// ── RENDER WORM FROM GOOGLE ROUTE ──
function renderGoogleWorm(route, idx){
  const leg=route.legs?.[0];
  if(!leg)return;

  const dur=leg.duration?.text||'—';
  const depTime=leg.departure_time?.text||'Now';
  const arrTime=leg.arrival_time?.text||'—';
  const depVal=leg.departure_time?.value;
  const leaveIn=depVal?Math.round((depVal*1000-Date.now())/60000):null;
  const li=leaveIn??99;

  let action,cls;
  if(li<=0){action='LEAVE NOW';cls='urg-now';}
  else if(li<=2){action='LEAVE NOW';cls='urg-now';}
  else if(li<=6){action=`LEAVE IN ${li} MIN`;cls='urg-soon';}
  else{action=`Leave in ${li} min`;cls='urg-go';}

  document.getElementById('urg-hero').innerHTML=`
    <div class="urg-action ${cls}">${action}</div>
    <div class="urg-sub">${depTime} → ${arrTime} · ${dur}</div>`;

  // Draw route on Mapbox using step coordinates
  const coords=[];
  (leg.steps||[]).forEach(step=>{
    if(step.start_location) coords.push([step.start_location.lng,step.start_location.lat]);
    if(step.end_location)   coords.push([step.end_location.lng,step.end_location.lat]);
  });
  if(userLat&&coords.length) coords.unshift([userLng,userLat]);

  // Get dominant bus color
  const transitSteps=(leg.steps||[]).filter(s=>s.travel_mode==='TRANSIT');
  const firstBus=transitSteps[0]?.transit_details;
  const wormColor=firstBus?.line?.color||BUS_COLOR[firstBus?.line?.short_name]?.bg||'#0039A6';

  if(map.getLayer('worm-line'))map.removeLayer('worm-line');
  if(map.getSource('worm-source'))map.removeSource('worm-source');

  if(coords.length>=2){
    map.addSource('worm-source',{type:'geojson',data:{type:'Feature',geometry:{type:'LineString',coordinates:coords}}});
    map.addLayer({id:'worm-line',type:'line',source:'worm-source',
      layout:{'line-join':'round','line-cap':'round'},
      paint:{'line-color':wormColor,'line-width':['interpolate',['linear'],['zoom'],10,4,16,10],'line-opacity':0.85}
    },'stops-glow');

    // Zoom to fit
    const bounds=new mapboxgl.LngLatBounds();
    coords.forEach(c=>bounds.extend(c));
    map.fitBounds(bounds,{padding:{top:180,bottom:300,left:40,right:40},maxZoom:15,speed:1.2});
  }

  // Build step chips — each transit step is a node
  const chipHtml=transitSteps.map((step,i)=>{
    const t=step.transit_details;
    const name=t?.line?.short_name||t?.line?.name||'Bus';
    const color=t?.line?.color||BUS_COLOR[name]?.bg||'#555';
    const board=t?.stop_name||'—';
    const stops=t?.num_stops||'—';
    const depMins=t?.departure_stop?Math.round((new Date(t.departure_time?.value*1000)-Date.now())/60000):null;
    return`<div class="schip${i===0?' active':''}" onclick="openTransitStepSheet(${idx},${i})">
      <span class="schip-route" style="color:${color}">${name}</span>
      <span class="schip-stop">${board}</span>
      ${depMins!=null?`<span class="schip-mins">${depMins}m</span><span class="schip-lbl">DEPARTS</span>`:'<span class="schip-mins" style="color:#ddd">—</span>'}
    </div>`;
  }).join('');

  const changeBtn=`<div class="schip" style="background:#f0f4ff;border-color:#0039A6;cursor:pointer" onclick="showAllOptions(window._googleRoutes,window._fromVal,window._toVal)">
    <span class="schip-route" style="color:#0039A6">↩</span>
    <span class="schip-stop">All options</span>
    <span class="schip-mins" style="font-size:12px;color:#0039A6">back</span>
  </div>`;

  document.getElementById('stop-chips').innerHTML=chipHtml+changeBtn;

  // Build worm SVG from transit steps
  buildGoogleWormSVG(transitSteps, wormColor);

  document.getElementById('worm-sheet').classList.add('open');
}

// ── WORM SVG from Google transit steps ──
function buildGoogleWormSVG(steps, color){
  const N=Math.max(steps.length,2);
  const W=Math.max(280,N*90+60);
  const H=60; const cy=H/2;
  const pts=steps.map((s,i)=>({x:36+i*90, y:cy+(i%2===0?-7:7)}));

  let d=pts.length>0?`M 12 ${cy} Q 24 ${cy} ${pts[0].x} ${pts[0].y}`:`M 12 ${cy} L ${W-20} ${cy}`;
  for(let i=1;i<pts.length;i++){
    const cpx=(pts[i-1].x+pts[i].x)/2;
    d+=` Q ${cpx} ${(pts[i-1].y+pts[i].y)/2} ${pts[i].x} ${pts[i].y}`;
  }

  let svg=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block">
<defs>
  <linearGradient id="wg2" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
    <stop offset="50%" stop-color="${color}" stop-opacity="1"/>
    <stop offset="100%" stop-color="${color}" stop-opacity="0.6"/>
  </linearGradient>
  <filter id="glow2"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<path d="${d}" fill="none" stroke="url(#wg2)" stroke-width="12" stroke-linecap="round" filter="url(#glow2)"/>
<path d="${d}" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round" stroke-dasharray="16 32">
  <animate attributeName="stroke-dashoffset" from="48" to="0" dur="1.8s" repeatCount="indefinite"/>
</path>`;

  pts.forEach((pt,i)=>{
    const t=steps[i]?.transit_details;
    const name=t?.line?.short_name||'';
    const c=t?.line?.color||color;
    const isLast=i===pts.length-1;
    svg+=`<circle cx="${pt.x}" cy="${pt.y}" r="${isLast?11:9}" fill="${c}" stroke="white" stroke-width="2.5" filter="url(#glow2)"/>`;
    if(name) svg+=`<text x="${pt.x}" y="${pt.y+4}" text-anchor="middle" fill="white" font-size="7" font-weight="900">${name}</text>`;
  });

  // User head
  svg+=`<circle cx="12" cy="${cy}" r="9" fill="#00A651" stroke="white" stroke-width="2.5" filter="url(#glow2)">
    <animate attributeName="r" values="8;11;8" dur="2s" repeatCount="indefinite"/>
  </circle><circle cx="12" cy="${cy}" r="4" fill="white"/>`;
  svg+=`</svg>`;
  document.getElementById('worm-svg-wrap').innerHTML=svg;
}

// tap a step chip to see stop details
async function openTransitStepSheet(routeIdx, stepIdx){
  const route=window._googleRoutes?.[routeIdx];
  const transitSteps=(route?.legs?.[0]?.steps||[]).filter(s=>s.travel_mode==='TRANSIT');
  const step=transitSteps[stepIdx];
  if(!step)return;
  const t=step.transit_details;
  const name=t?.line?.short_name||t?.line?.name||'Bus';
  const color=t?.line?.color||BUS_COLOR[name]?.bg||'#555';
  const board=t?.stop_name||'—';
  const alight=t?.arrival_stop?.name||'—';
  const numStops=t?.num_stops||'—';
  const dep=t?.departure_time?.text||'—';
  const arr=t?.arrival_time?.text||'—';

  document.getElementById('sheet-content').innerHTML=`
    <div class="stop-name">${board}</div>
    <div class="stop-tags">
      <div class="tag" style="background:${color};color:white">${name}</div>
      <div class="tag">${numStops} stops</div>
      <div class="tag">→ ${alight}</div>
    </div>
    <div class="arr-title">This bus</div>
    <div class="arr-row urg-go">
      <div class="bus-icon" style="background:${color}">${name}</div>
      <div class="arr-info">
        <div class="arr-line">Board at ${board}</div>
        <div class="arr-seq">Exit at ${alight} · ${numStops} stops</div>
      </div>
      <div class="arr-mins col-go">${dep}<small style="font-size:10px;display:block;color:#aaa">dep</small></div>
    </div>`;
  document.getElementById('stop-sheet').classList.add('open');
}

function showError(msg){
  document.getElementById('options-list').innerHTML=`<div style="color:#aaa;font-size:13px;padding:20px;text-align:center">${msg}</div>`;
  document.getElementById('options-sheet').classList.add('open');
}

document.getElementById('to-input').addEventListener('keydown',e=>{if(e.key==='Enter')findRoute();});
document.getElementById('from-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('to-input').focus();});

// ── MTA ARRIVALS (for stop bubble taps) ──
async function fetchBus(stopId,routeId){
  try{const r=await fetch(`/api/arrivals?stopId=${stopId}&route=${encodeURIComponent(routeId)}`);if(!r.ok)return null;const j=await r.json();return j.arrivals?.map(a=>a.mins)||null;}catch{return null;}
}
function simMins(sid,rid){
  const seed=(sid+rid).split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const off=(Date.now()/60000)%25;
  const f=((seed%14)+3-off+25)%23+1;
  return[Math.round(f),Math.round(f+9),Math.round(f+19)];
}

// ── GOOGLE FALLBACK ──
async function googleFallback(from,to){
  try{
    const r=await fetch(`/api/directions?origin=${encodeURIComponent(from)}&destination=${encodeURIComponent(to)}`);
    const d=await r.json();
    if(!d.routes?.length)return;
    const leg=d.routes[0].legs?.[0];
    if(!leg)return;
    document.getElementById('urg-hero').innerHTML=`
      <div class="urg-action urg-go">${leg.duration?.text||'—'}</div>
      <div class="urg-sub">Departs ${leg.departure_time?.text||'Now'} · Arrives ${leg.arrival_time?.text||'—'}</div>`;
    document.getElementById('stop-chips').innerHTML=`<div style="font-size:11px;color:#aaa;padding:8px">Google route · tap stops on map for arrivals</div>`;
    document.getElementById('worm-sheet').classList.add('open');
  }catch(e){console.error(e);}
}

// Start
initMap();
</script>
