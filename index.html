<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TownTrip</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI;
background:white;
}

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}

#topUI{
position:absolute;
top:12px;
left:12px;
right:12px;
z-index:5;
display:flex;
gap:10px;
}

#inputs{
flex:1;
display:flex;
flex-direction:column;
gap:6px;
}

.search{
height:40px;
border-radius:10px;
border:1px solid #ddd;
padding-left:10px;
font-size:14px;
}

#weather{
width:70px;
height:36px;
background:white;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 12px rgba(0,0,0,.15);
font-weight:600;
}

#triangle{
width:36px;
height:36px;
border-radius:8px;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 12px rgba(0,0,0,.15);
cursor:pointer;
}

#panel{
position:absolute;
bottom:0;
left:0;
right:0;
background:white;
padding:14px;
border-top-left-radius:16px;
border-top-right-radius:16px;
box-shadow:0 -4px 14px rgba(0,0,0,.15);
max-height:40%;
overflow:auto;
}

.step{
padding:6px;
border-bottom:1px solid #eee;
font-size:14px;
}

#styleToggle{
position:absolute;
bottom:14px;
right:14px;
background:white;
width:44px;
height:44px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 12px rgba(0,0,0,.15);
cursor:pointer;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="topUI">

<div id="triangle">▲</div>

<div id="inputs">
<input id="start" class="search" placeholder="Start">
<input id="dest" class="search" placeholder="Destination">
</div>

<div id="weather">--°</div>

</div>

<div id="panel">
<div id="steps"></div>
</div>

<div id="styleToggle">🛰</div>

<script>

let map
let liveMarker
let startCoord=null
let destCoord=null
let route

async function getToken(){
const r=await fetch("/api/mapboxtoken")
return (await r.json()).token
}

async function init(){

const token=await getToken()
mapboxgl.accessToken=token

map=new mapboxgl.Map({
container:"map",
style:"mapbox://styles/mapbox/standard",
center:[-73.9035,40.8817],
zoom:15,
pitch:60
})

map.on("load",()=>{

map.addSource("mapbox-dem",{
type:"raster-dem",
url:"mapbox://mapbox.mapbox-terrain-dem-v1",
tileSize:512
})

map.setTerrain({source:"mapbox-dem",exaggeration:1.2})

map.addSource("route",{
type:"geojson",
data:{
type:"Feature",
geometry:{type:"LineString",coordinates:[]}
}
})

map.addLayer({
id:"routeLine",
type:"line",
source:"route",
paint:{
"line-color":"#2563eb",
"line-width":5
}
})

})

startTracking()
loadWeather()

}

function startTracking(){

navigator.geolocation.watchPosition(pos=>{

let lng=pos.coords.longitude
let lat=pos.coords.latitude

if(!liveMarker){
liveMarker=new mapboxgl.Marker({color:"green"})
.setLngLat([lng,lat])
.addTo(map)
}

liveMarker.setLngLat([lng,lat])

map.flyTo({center:[lng,lat],zoom:16})

},err=>console.log(err),{
enableHighAccuracy:true
})

}

async function routeTo(){

if(!startCoord||!destCoord)return

const token=await getToken()

let url=`https://api.mapbox.com/directions/v5/mapbox/walking/${startCoord[0]},${startCoord[1]};${destCoord[0]},${destCoord[1]}?geometries=geojson&steps=true&access_token=${token}`

let r=await fetch(url)
let d=await r.json()

route=d.routes[0]

map.getSource("route").setData({
type:"Feature",
geometry:route.geometry
})

showSteps(route.legs[0].steps)

}

function showSteps(steps){

let el=document.getElementById("steps")
el.innerHTML=""

steps.forEach(s=>{
let div=document.createElement("div")
div.className="step"
div.textContent=s.maneuver.instruction
el.appendChild(div)
})

}

async function geocode(q){

const token=await getToken()

let r=await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(q)}.json?access_token=${token}`)
let d=await r.json()

return d.features[0].center

}

document.getElementById("start").addEventListener("change",async e=>{
startCoord=await geocode(e.target.value)
routeTo()
})

document.getElementById("dest").addEventListener("change",async e=>{
destCoord=await geocode(e.target.value)
routeTo()
})

document.getElementById("triangle").onclick=()=>{
if(!liveMarker)return
let c=liveMarker.getLngLat()
startCoord=[c.lng,c.lat]
document.getElementById("start").value="My Location"
routeTo()
}

document.getElementById("styleToggle").onclick=()=>{

let current=map.getStyle().sprite

if(current.includes("standard")){
map.setStyle("mapbox://styles/mapbox/standard-satellite")
}else{
map.setStyle("mapbox://styles/mapbox/standard")
}

}

async function loadWeather(){

navigator.geolocation.getCurrentPosition(async pos=>{

let lat=pos.coords.latitude
let lng=pos.coords.longitude

let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m&temperature_unit=fahrenheit`)

let d=await r.json()

document.getElementById("weather").textContent=Math.round(d.current.temperature_2m)+"°"

})

}

init()

</script>

</body>
</html>
